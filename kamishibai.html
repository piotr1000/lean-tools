<html lang="pl">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const SUPABASE_URL = 'https://hyisabnvzrdplnucwfeh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_SXzGVMnJ8cJE-pmcGLgyTg_iL6PI66h';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const { useState, useCallback, useRef, useEffect } = React;


const DAYS   = ['Poniedziałek','Wtorek','Środa','Czwartek','Piątek','Sobota','Niedziela'];
const SUBS   = ['I','II','III'];
const MONTHS = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];

const OC_BG    = { '':'#d1d5db', green:'#16a34a', yellow:'#ca8a04', red:'#dc2626' };
const OC_RING  = { '':'#9ca3af', green:'#22c55e', yellow:'#eab308', red:'#ef4444' };
const OC_LABEL = { '':'Brak',    green:'OK',       yellow:'Uwaga',   red:'Problem' };

const now = new Date();

function initCells() {
  const c = {};
  DAYS.forEach((_,di) => SUBS.forEach((_,si) => {
    c[`${di}_${si}`] = { o1:'',o2:'',o3:'',o4:'',uwagi:'',dzialania:'',kto:'',termin:'',ocena:'',wykonane:false };
  }));
  return c;
}

function computeOcena(uwagi, termin, wykonane) {
  if (wykonane) return 'green';
  if (!uwagi.trim()) return '';
  if (termin) {
    const d = new Date(termin);
    if (!isNaN(d) && new Date() > d) return 'red';
  }
  return 'yellow';
}

function fmtDatetime(val) {
  if (!val) return '—';
  const d = new Date(val);
  if (isNaN(d)) return val;
  return d.toLocaleString('pl-PL', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

/* ─── Cell textarea ─── */
function Cell({ value, onChange, placeholder }) {
  return (
    <textarea value={value} onChange={e => onChange(e.target.value)}
      placeholder={placeholder} rows={1} className="cell-input"
      onFocus={e => e.target.classList.add('cell-focus')}
      onBlur={e  => e.target.classList.remove('cell-focus')}
      onInput={e => { e.target.style.height='auto'; e.target.style.height=e.target.scrollHeight+'px'; }}
    />
  );
}

/* ─── Custom DateTime Picker ─── */
const WDAYS = ['Pn','Wt','Śr','Cz','Pt','So','Nd'];
const MNAMES = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];

function TerminPicker({ value, onChange }) {
  const [open, setOpen]     = useState(false);
  const [viewYear, setViewYear]   = useState(() => value ? new Date(value).getFullYear() : new Date().getFullYear());
  const [viewMonth, setViewMonth] = useState(() => value ? new Date(value).getMonth()    : new Date().getMonth());
  const [selDate, setSelDate]     = useState(() => value ? value.slice(0,10) : '');
  const [selHour, setSelHour]     = useState(() => value ? value.slice(11,13) : '12');
  const [selMin,  setSelMin]      = useState(() => value ? value.slice(14,16) : '00');
  const ref = useRef(null);

  /* Close on outside click */
  useEffect(() => {
    if (!open) return;
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  /* Sync when parent resets value */
  useEffect(() => {
    if (!value) { setSelDate(''); setSelHour('12'); setSelMin('00'); }
    else {
      setSelDate(value.slice(0,10));
      setSelHour(value.slice(11,13) || '12');
      setSelMin(value.slice(14,16)  || '00');
      const d = new Date(value);
      if (!isNaN(d)) { setViewYear(d.getFullYear()); setViewMonth(d.getMonth()); }
    }
  }, [value]);

  /* Build calendar days grid */
  const firstDay = new Date(viewYear, viewMonth, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const offset = (firstDay + 6) % 7; // Mon-based
  const cells = [];
  for (let i = 0; i < offset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const todayStr = new Date().toISOString().slice(0,10);
  const fmt = (n) => String(n).padStart(2,'0');

  const selectDay = (d) => {
    const s = `${viewYear}-${fmt(viewMonth+1)}-${fmt(d)}`;
    setSelDate(s);
  };

  const confirm = () => {
    if (!selDate) return;
    onChange(`${selDate}T${selHour}:${selMin}`);
    setOpen(false);
  };

  const setToday = () => {
    const d = new Date();
    const s = d.toISOString().slice(0,10);
    setSelDate(s);
    setViewYear(d.getFullYear());
    setViewMonth(d.getMonth());
    setSelHour(fmt(d.getHours()));
    setSelMin(fmt(d.getMinutes()));
  };

  const clearAll = () => {
    setSelDate(''); setSelHour('12'); setSelMin('00');
    onChange('');
    setOpen(false);
  };

  const prevM = () => { if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1); };
  const nextM = () => { if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1); };

  /* Display label */
  const displayVal = value
    ? new Date(value).toLocaleString('pl-PL',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
    : '';

  return (
    <div className="tp-root" ref={ref}>
      <div className="tp-trigger" onClick={() => setOpen(o => !o)}>
        <span className={displayVal ? 'tp-val' : 'tp-placeholder'}>
          {displayVal || 'dd.mm.rrrr --:--'}
        </span>
        <span className="tp-icon">📅</span>
        {value && <button className="tp-x" onPointerDown={e=>{e.stopPropagation();clearAll();}}>×</button>}
      </div>

      {open && (
        <div className="tp-popup">
          {/* Month nav */}
          <div className="tp-mnav">
            <button className="tp-marr" onClick={prevM}>‹</button>
            <span className="tp-mtitle">{MNAMES[viewMonth]} {viewYear}</span>
            <button className="tp-marr" onClick={nextM}>›</button>
          </div>

          {/* Day headers */}
          <div className="tp-grid">
            {WDAYS.map(w => <div key={w} className="tp-wday">{w}</div>)}
            {cells.map((d, i) => {
              if (!d) return <div key={`e-${i}`} />;
              const ds = `${viewYear}-${fmt(viewMonth+1)}-${fmt(d)}`;
              const isToday  = ds === todayStr;
              const isSel    = ds === selDate;
              return (
                <button key={ds}
                  className={`tp-day ${isToday?'tp-today':''} ${isSel?'tp-sel':''}`}
                  onClick={() => selectDay(d)}>
                  {d}
                </button>
              );
            })}
          </div>

          {/* Time picker */}
          <div className="tp-time">
            <span className="tp-time-lbl">Godzina:</span>
            <select className="tp-sel-input" value={selHour} onChange={e=>setSelHour(e.target.value)}>
              {Array.from({length:24},(_,i)=>fmt(i)).map(h=><option key={h} value={h}>{h}</option>)}
            </select>
            <span className="tp-time-sep">:</span>
            <select className="tp-sel-input" value={selMin} onChange={e=>setSelMin(e.target.value)}>
              {['00','05','10','15','20','25','30','35','40','45','50','55'].map(m=><option key={m} value={m}>{m}</option>)}
            </select>
          </div>

          {/* Action buttons */}
          <div className="tp-actions">
            <button className="tp-act-clear" onClick={clearAll}>Wyczyść</button>
            <button className="tp-act-today" onClick={setToday}>Dzisiaj</button>
            <button className="tp-act-confirm" onClick={confirm} disabled={!selDate}>Zatwierdź</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── Ocena dot (auto, read-only) ─── */
function OcenaDisplay({ value }) {
  return (
    <div className="ocena-wrap">
      <div className="ocena-dot" style={{ background: OC_BG[value], borderColor: OC_RING[value] }} title={OC_LABEL[value]} />
      {value && <span className="ocena-lbl" style={{ color: OC_RING[value] }}>{OC_LABEL[value]}</span>}
    </div>
  );
}

/* ─── Area header ─── */
function AreaHeader({ value, onChange }) {
  const [editing, setEditing] = useState(false);
  const [draft,   setDraft]   = useState(value);
  const save = () => { onChange(draft || value); setEditing(false); };
  if (editing) return (
    <input autoFocus value={draft} className="area-input"
      onChange={e => setDraft(e.target.value)} onBlur={save}
      onKeyDown={e => { if(e.key==='Enter') save(); if(e.key==='Escape') setEditing(false); }}
    />
  );
  return (
    <div className="area-header" onClick={() => { setDraft(value); setEditing(true); }} title="Kliknij aby zmienić">
      <span className="area-name">{value}</span>
      <span className="area-edit-hint">✎ edytuj</span>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   SAVE AUDIT MODAL
════════════════════════════════════════════════════════ */
function SaveAuditModal({ month, year, auditArchive, onSave, onClose }) {
  const [auditNum, setAuditNum] = useState(null);
  const [clearAfter, setClearAfter] = useState(false);
  const existing = auditArchive[year]?.[month] || {};
  const fmtSaved = (iso) => iso
    ? new Date(iso).toLocaleString('pl-PL',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
    : null;

  return (
    <div className="modal-overlay" onClick={e=>{ if(e.target.className==='modal-overlay') onClose(); }}>
      <div className="modal-box" style={{ maxWidth:'480px' }}>
        <div className="modal-hdr">
          <div className="modal-title-block">
            <span className="modal-pretitle">Kamishibai</span>
            <span className="modal-title">💾 Zapisz audyt</span>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div style={{ padding:'1.5rem' }}>
          <p style={{ margin:'0 0 1rem', color:'#475569', fontSize:'0.875rem' }}>
            Zapisujesz audyt dla: <strong style={{color:'#1e293b'}}>{MONTHS[month]} {year}</strong>
          </p>
          <div style={{ display:'flex', gap:'1rem', marginBottom:'1.25rem' }}>
            {[1,2].map(n => (
              <button key={n} onClick={() => setAuditNum(n)}
                style={{
                  flex:1, padding:'0.875rem', borderRadius:'0.5rem', cursor:'pointer',
                  border: auditNum===n ? '2px solid #3b82f6' : '1px solid #d4c9b0',
                  background: auditNum===n ? '#eff6ff' : 'white',
                  fontFamily:'inherit', fontSize:'1rem', fontWeight:700,
                  color: auditNum===n ? '#2563eb' : '#374151', transition:'all 0.15s',
                }}>
                Audyt {n}
                {existing[n] ? (
                  <span style={{ display:'block', fontSize:'0.625rem', fontWeight:400, color:'#ef4444', marginTop:'0.3rem' }}>
                    ⚠ Nadpisze: {fmtSaved(existing[n].savedAt)}
                  </span>
                ) : (
                  <span style={{ display:'block', fontSize:'0.625rem', fontWeight:400, color:'#22c55e', marginTop:'0.3rem' }}>
                    ✓ Wolny slot
                  </span>
                )}
              </button>
            ))}
          </div>
          <label style={{ display:'flex', alignItems:'center', gap:'0.5rem', cursor:'pointer', marginBottom:'1.5rem', fontSize:'0.875rem', color:'#374151' }}>
            <input type="checkbox" checked={clearAfter} onChange={e=>setClearAfter(e.target.checked)} style={{ width:'1rem', height:'1rem' }} />
            Wyczyść tablicę po zapisaniu (gotowa na kolejny audyt)
          </label>
          <div style={{ display:'flex', gap:'0.75rem', justifyContent:'flex-end' }}>
            <button className="k-btn k-btn-cancel" onClick={onClose}>Anuluj</button>
            <button className="k-btn" disabled={!auditNum}
              onClick={() => auditNum && onSave(auditNum, clearAfter)}
              style={{ background:auditNum?'#16a34a':'#a8a29e', color:'white', border:'none', opacity:auditNum?1:0.65, cursor:auditNum?'pointer':'not-allowed' }}>
              💾 Zapisz audyt {auditNum || ''}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   STATISTICS MODAL — archiwum audytów
════════════════════════════════════════════════════════ */
function StatsModal({ auditArchive, areaLabels, statsNotes, onNoteChange, onClose, currentMonth, currentYear, onDeleteAudit, onRestoreAudit }) {
  const [selYear,       setSelYear]       = useState(currentYear);
  const [selMonth,      setSelMonth]      = useState(currentMonth);
  const [selAudit,      setSelAudit]      = useState(1);
  const [filterStatus,  setFilterStatus]  = useState('all');
  const [confirmDelete, setConfirmDelete] = useState(false);

  const snapshot = auditArchive[selYear]?.[selMonth]?.[selAudit] || null;
  const snapCells = snapshot?.cells || {};

  /* Zbierz problemy ze snapshotu */
  const issues = [];
  if (snapshot) {
    DAYS.forEach((day, di) => {
      SUBS.forEach((sub, si) => {
        const cell = snapCells[`${di}_${si}`];
        if (!cell?.uwagi?.trim()) return;
        const obszary = ['o1','o2','o3','o4']
          .filter(k => cell[k]?.trim())
          .map(k => ({ key: k, label: areaLabels[k], value: cell[k] }));
        issues.push({ key:`${di}_${si}`, day, sub, di, si, obszary,
          uwagi:cell.uwagi, ocena:cell.ocena, termin:cell.termin,
          kto:cell.kto, dzialania:cell.dzialania, wykonane:cell.wykonane });
      });
    });
  }

  const filtered = filterStatus === 'all' ? issues : issues.filter(i => i.ocena === filterStatus);
  const countByStatus = { red:0, yellow:0, green:0 };
  issues.forEach(i => { if (countByStatus[i.ocena] !== undefined) countByStatus[i.ocena]++; });

  const availableYears = [...new Set([currentYear, currentYear-1, ...Object.keys(auditArchive).map(Number)])].sort((a,b)=>b-a);
  const fmtDate = (iso) => iso ? new Date(iso).toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit',year:'numeric'}) : '';

  return (
    <div className="modal-overlay" onClick={e=>{ if(e.target.className==='modal-overlay') onClose(); }}>
      <div className="modal-box">

        {/* ── Header ── */}
        <div className="modal-hdr">
          <div className="modal-title-block">
            <span className="modal-pretitle">Kamishibai</span>
            <span className="modal-title">📊 Archiwum audytów</span>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        {/* ── Rok + Miesiące ── */}
        <div style={{ background:'#1e293b', padding:'0.75rem 1.5rem', display:'flex', gap:'1.25rem', alignItems:'center', borderBottom:'2px solid #0f172a', flexWrap:'wrap' }}>
          <div style={{ display:'flex', gap:'0.4rem', alignItems:'center' }}>
            <span style={{ fontSize:'0.6rem', color:'#64748b', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em' }}>Rok:</span>
            {availableYears.map(y => (
              <button key={y} onClick={() => setSelYear(y)}
                style={{ background:selYear===y?'#38bdf8':'#334155', color:selYear===y?'#0f172a':'#94a3b8', border:'none', borderRadius:'0.3rem', padding:'0.2rem 0.6rem', fontSize:'0.75rem', fontWeight:700, cursor:'pointer', fontFamily:'inherit', transition:'all 0.15s' }}>
                {y}
              </button>
            ))}
          </div>
          <div style={{ display:'flex', gap:'0.3rem', flexWrap:'wrap' }}>
            {MONTHS.map((m, mi) => {
              const hasData = !!(auditArchive[selYear]?.[mi]);
              const isSel   = selMonth === mi;
              return (
                <button key={mi} onClick={() => { setSelMonth(mi); setSelAudit(1); setFilterStatus('all'); }}
                  style={{
                    background: isSel?'#38bdf8': hasData?'#1e3a5f':'transparent',
                    color: isSel?'#0f172a': hasData?'#7dd3fc':'#475569',
                    border: isSel?'none': hasData?'1px solid #2563eb':'1px solid #334155',
                    borderRadius:'0.3rem', padding:'0.2rem 0.45rem', fontSize:'0.6875rem',
                    fontWeight:isSel?700:500, cursor:'pointer', fontFamily:'inherit', transition:'all 0.15s',
                  }}>
                  {m.slice(0,3)}
                  {hasData && <span style={{ display:'block', fontSize:'0.45rem', color:isSel?'#0f172a':'#38bdf8', textAlign:'center' }}>●</span>}
                </button>
              );
            })}
          </div>
        </div>

        {/* ── Audyt 1 / Audyt 2 ── */}
        <div style={{ background:'#f1ede4', padding:'0.65rem 1.5rem', display:'flex', gap:'0.75rem', alignItems:'center', borderBottom:'1px solid #e2ddd4', flexWrap:'wrap' }}>
          <span style={{ fontSize:'0.75rem', color:'#78716c', fontWeight:600 }}>{MONTHS[selMonth]} {selYear}:</span>

          {/* Zakładki Audyt 1 / Audyt 2 */}
          {[1,2].map(n => {
            const snap = auditArchive[selYear]?.[selMonth]?.[n];
            const isSel = selAudit === n;
            return (
              <button key={n} onClick={() => { setSelAudit(n); setFilterStatus('all'); setConfirmDelete(false); }}
                style={{
                  background: isSel?'#1e293b':'white', color: isSel?'white':'#374151',
                  border: isSel?'none':'1px solid #d4c9b0', borderRadius:'0.4rem',
                  padding:'0.35rem 1rem', fontSize:'0.8125rem', fontWeight:700,
                  cursor:'pointer', fontFamily:'inherit', transition:'all 0.15s',
                }}>
                Audyt {n}
                {snap
                  ? <span style={{ display:'block', fontSize:'0.575rem', fontWeight:400, color:isSel?'#94a3b8':'#a8a29e' }}>{fmtDate(snap.savedAt)}</span>
                  : <span style={{ display:'block', fontSize:'0.575rem', fontWeight:400, color:'#d4c9b0' }}>Brak danych</span>
                }
              </button>
            );
          })}

          {/* Akcje: przywróć / usuń */}
          {snapshot && !confirmDelete && (
            <div style={{ display:'flex', gap:'0.4rem', alignItems:'center' }}>
              <button onClick={() => onRestoreAudit(snapshot)}
                title="Załaduj audyt z powrotem na tablicę do edycji"
                style={{ background:'rgba(56,189,248,0.12)', color:'#38bdf8', border:'1px solid rgba(56,189,248,0.35)', borderRadius:'0.35rem', padding:'0.25rem 0.7rem', fontSize:'0.6875rem', fontWeight:600, cursor:'pointer', fontFamily:'inherit', whiteSpace:'nowrap' }}>
                🔄 Przywróć na tablicę
              </button>
              <button onClick={() => setConfirmDelete(true)}
                title="Usuń ten audyt z archiwum"
                style={{ background:'rgba(220,38,38,0.08)', color:'#ef4444', border:'1px solid rgba(220,38,38,0.3)', borderRadius:'0.35rem', padding:'0.25rem 0.7rem', fontSize:'0.6875rem', fontWeight:600, cursor:'pointer', fontFamily:'inherit', whiteSpace:'nowrap' }}>
                🗑 Usuń audyt
              </button>
            </div>
          )}

          {/* Potwierdzenie usunięcia */}
          {snapshot && confirmDelete && (
            <div style={{ display:'flex', gap:'0.5rem', alignItems:'center', background:'#fff1f2', border:'1px solid #fca5a5', borderRadius:'0.5rem', padding:'0.3rem 0.75rem' }}>
              <span style={{ fontSize:'0.75rem', color:'#b91c1c', fontWeight:600 }}>
                Usunąć Audyt {selAudit} — {MONTHS[selMonth]} {selYear}?
              </span>
              <button onClick={() => { onDeleteAudit(selYear, selMonth, selAudit); setConfirmDelete(false); }}
                style={{ background:'#dc2626', color:'white', border:'none', borderRadius:'0.3rem', padding:'0.2rem 0.7rem', fontSize:'0.6875rem', fontWeight:700, cursor:'pointer', fontFamily:'inherit' }}>
                Tak, usuń
              </button>
              <button onClick={() => setConfirmDelete(false)}
                style={{ background:'transparent', color:'#64748b', border:'1px solid #cbd5e1', borderRadius:'0.3rem', padding:'0.2rem 0.7rem', fontSize:'0.6875rem', fontWeight:600, cursor:'pointer', fontFamily:'inherit' }}>
                Anuluj
              </button>
            </div>
          )}

          {/* Statystyki — liczniki */}
          {snapshot && !confirmDelete && (
            <div style={{ display:'flex', gap:'0.5rem', marginLeft:'auto', flexWrap:'wrap', alignItems:'center' }}>
              {[['red','#ef4444','Problemy'],['yellow','#eab308','Uwagi'],['green','#22c55e','OK']].map(([s,c,l]) => (
                <div key={s} className="modal-stat-pill" style={{ borderColor:c, background:c+'22' }}>
                  <span className="modal-stat-dot" style={{ background:c }} />
                  <span className="modal-stat-count" style={{ color:c }}>{countByStatus[s]}</span>
                  <span className="modal-stat-label">{l}</span>
                </div>
              ))}
              <span className="modal-total">Łącznie: <b>{issues.length}</b></span>
            </div>
          )}
        </div>

        {/* ── Filtry ── */}
        {snapshot && (
          <div className="modal-filters">
            <div className="filter-group">
              <span className="filter-label">Status:</span>
              {[['all','Wszystkie','#64748b'],['red','Problem','#ef4444'],['yellow','Uwaga','#eab308'],['green','OK','#22c55e']].map(([v,l,c]) => (
                <button key={v} onClick={() => setFilterStatus(v)}
                  className={`filter-btn ${filterStatus===v?'filter-active':''}`}
                  style={filterStatus===v?{ borderColor:c, color:c, background:c+'18' }:{}}>
                  {l}
                </button>
              ))}
            </div>
            {snapshot.dyzurny && (
              <span style={{ fontSize:'0.75rem', color:'#78716c' }}>👤 Dyżurny: <strong>{snapshot.dyzurny}</strong></span>
            )}
          </div>
        )}

        {/* ── Treść ── */}
        {!snapshot ? (
          <div className="modal-empty">
            📋 Brak zapisanego Audytu {selAudit} dla <strong>{MONTHS[selMonth]} {selYear}</strong>.<br/>
            <span style={{ fontSize:'0.8125rem', color:'#a8a29e', marginTop:'0.5rem', display:'block' }}>
              Użyj przycisku "💾 Zapisz audyt" na tablicy głównej.
            </span>
          </div>
        ) : filtered.length === 0 ? (
          <div className="modal-empty">
            {issues.length === 0 ? '✅ Brak wpisanych uwag w tym audycie.' : 'Brak wyników dla wybranego filtra.'}
          </div>
        ) : (
          <div className="modal-table-wrap">
            <table className="modal-table">
              <thead>
                <tr>
                  <th style={{ width:'4rem' }}>Status</th>
                  <th style={{ width:'5.5rem' }}>Dzień / wiersz</th>
                  <th style={{ width:'14%' }}>Obszar</th>
                  <th style={{ width:'22%' }}>Opis problemu<br/><span className="th-sub">(z kolumny Uwagi)</span></th>
                  <th style={{ width:'10%' }}>Kto</th>
                  <th style={{ width:'8rem' }}>Termin</th>
                  <th>Działania zaradcze<br/><span className="th-sub">(notatki kierownika / lidera)</span></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(issue => {
                  const noteKey = `${selYear}_${selMonth}_${selAudit}_${issue.key}`;
                  const note = statsNotes[noteKey] || '';
                  return (
                    <tr key={issue.key} className={`srow srow-${issue.ocena}`}>
                      <td className="s-status">
                        <div className="s-dot" style={{ background:OC_BG[issue.ocena], borderColor:OC_RING[issue.ocena] }} />
                        <span className="s-status-lbl" style={{ color:OC_RING[issue.ocena] }}>{OC_LABEL[issue.ocena]}</span>
                        {issue.wykonane && <span style={{ display:'block', fontSize:'0.55rem', color:'#22c55e', fontWeight:700, marginTop:'0.2rem' }}>✓ WYKON.</span>}
                      </td>
                      <td className="s-day">
                        <span className="s-dayname">{issue.day}</span>
                        <span className="s-sub">{issue.sub}</span>
                      </td>
                      <td className="s-area">
                        {issue.obszary.length > 0 ? (
                          <div className="s-obszary">
                            {issue.obszary.map(o => (
                              <div key={o.key} className="s-obszar-item">
                                <span className="s-obszar-lbl">{o.label}</span>
                                {o.value && <span className="s-obszar-val">{o.value}</span>}
                              </div>
                            ))}
                          </div>
                        ) : <span className="s-empty">—</span>}
                      </td>
                      <td className="s-problem">
                        <span className="s-problem-text">{issue.uwagi}</span>
                        {issue.dzialania && <span className="s-dzialania-ref">↳ {issue.dzialania}</span>}
                      </td>
                      <td className="s-kto">{issue.kto || '—'}</td>
                      <td className="s-termin">
                        {issue.ocena==='red' && !issue.wykonane && <span className="s-overdue">⚠ Po terminie</span>}
                        <span className={issue.ocena==='red' && !issue.wykonane?'s-termin-red':''}>{fmtDatetime(issue.termin)}</span>
                      </td>
                      <td className="s-note-td">
                        <textarea className="s-note-input" value={note}
                          onChange={e => onNoteChange(noteKey, e.target.value)}
                          placeholder="Wpisz działania zaradcze..." rows={2}
                          onInput={e=>{ e.target.style.height='auto'; e.target.style.height=e.target.scrollHeight+'px'; }} />
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}

        <div className="modal-footer">
          <span className="modal-footer-note">
            💡 Notatki są zapisywane dynamicznie per audyt.
          </span>
          <button className="k-btn k-btn-cancel" onClick={onClose}>Zamknij</button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   MAIN APP
════════════════════════════════════════════════════════ */
function App() {
  const [month, setMonth]               = useState(now.getMonth());
  const [year,  setYear]                = useState(now.getFullYear());
  const [areaLabels, setAreaLabels]     = useState({ o1:'OBSZAR 1',o2:'OBSZAR 2',o3:'OBSZAR 3',o4:'OBSZAR 4' });
  const [cells, setCells]               = useState(initCells);
  const [dyzurny, setDyzurny]           = useState('');
  const [confirmClear, setConfirmClear] = useState(false);
  const [showStats, setShowStats]       = useState(false);
  const [showAuditSave, setShowAuditSave] = useState(false);
  const [statsNotes, setStatsNotes]     = useState({});
  const [loading, setLoading] = useState(true);

const loadFromSupabase = useCallback(async (y, m) => {
  setLoading(true);
  try {
    // Ładuj karty
    const { data: cards } = await supabaseClient
      .from('kamishibai_cards')
      .select('*')
      .eq('year', y)
      .eq('month', m);

    if (cards && cards.length > 0) {
      const newCells = initCells();
      cards.forEach(card => {
        const key = `${card.day_index}_${card.sub_index}`;
        newCells[key] = {
          o1: card.o1, o2: card.o2, o3: card.o3, o4: card.o4,
          uwagi: card.uwagi, dzialania: card.dzialania,
          kto: card.kto, termin: card.termin, ocena: card.ocena
        };
      });
      setCells(newCells);
    } else {
      setCells(initCells());
    }

    // Ładuj config (nagłówki obszarów + dyżurny)
    const { data: cfg } = await supabaseClient
      .from('kamishibai_config')
      .select('*')
      .eq('year', y)
      .eq('month', m)
      .single();

    if (cfg) {
      setAreaLabels({ o1: cfg.area_label_1, o2: cfg.area_label_2, o3: cfg.area_label_3, o4: cfg.area_label_4 });
      setDyzurny(cfg.dyzurny);
    } else {
      setAreaLabels({ o1:'OBSZAR 1', o2:'OBSZAR 2', o3:'OBSZAR 3', o4:'OBSZAR 4' });
      setDyzurny('');
    }

    // Ładuj notatki statystyk
    const { data: notes } = await supabaseClient
      .from('kamishibai_notes')
      .select('*')
      .eq('year', y)
      .eq('month', m);

    if (notes && notes.length > 0) {
      const newNotes = {};
      notes.forEach(n => { newNotes[n.card_key] = n.note; });
      setStatsNotes(newNotes);
    } else {
      setStatsNotes({});
    }

  } catch(err) {
    console.error('Błąd ładowania:', err);
  } finally {
    setLoading(false);
  }
}, []);

useEffect(() => {
  loadFromSupabase(year, month);
}, [year, month]);

  const [auditArchive, setAuditArchive] = useState({});

  /* Active issue count for badge */
  const activeIssues = Object.values(cells).filter(c => c.uwagi.trim()).length;

  /* ── Auto-check deadlines every minute ── */
useEffect(() => {
  const tick = () => {
    setCells(prev => {
      let changed = false;
      const next = { ...prev };
      Object.keys(next).forEach(k => {
        const cell = next[k];
        if (!cell.uwagi.trim() || cell.wykonane) return;
        const auto = computeOcena(cell.uwagi, cell.termin, cell.wykonane);
        if (auto !== cell.ocena) { next[k] = { ...cell, ocena: auto }; changed = true; }
      });
      return changed ? next : prev;
    });
  };
  tick();
  const id = setInterval(tick, 60_000);
  return () => clearInterval(id);
}, []);

  /* ── Update cell with auto-ocena ── */
const saveCardToSupabase = useCallback(async (di, si, cellData) => {
  await supabaseClient
    .from('kamishibai_cards')
    .upsert({
      year: year, month: month,
      day_index: di, sub_index: si,
      o1: cellData.o1, o2: cellData.o2, o3: cellData.o3, o4: cellData.o4,
      uwagi: cellData.uwagi, dzialania: cellData.dzialania,
      kto: cellData.kto, termin: cellData.termin, ocena: cellData.ocena
    }, { onConflict: 'year,month,day_index,sub_index' });
}, [year, month]);

const saveConfigToSupabase = useCallback(async (labels, dyz) => {
  await supabaseClient
    .from('kamishibai_config')
    .upsert({
      year: year, month: month,
      area_label_1: labels.o1, area_label_2: labels.o2,
      area_label_3: labels.o3, area_label_4: labels.o4,
      dyzurny: dyz
    }, { onConflict: 'year,month' });
}, [year, month]);

const saveNoteToSupabase = useCallback(async (key, note) => {
  await supabaseClient
    .from('kamishibai_notes')
    .upsert({
      year: year, month: month,
      card_key: key, note: note
    }, { onConflict: 'year,month,card_key' });
}, [year, month]);

  /* ── Update cell with auto-ocena ── */
const updateCell = useCallback((di, si, field, val) => {
  setCells(prev => {
    const key  = `${di}_${si}`;
    const old  = prev[key];
    const upd  = { ...old, [field]: val };
    if (field === 'uwagi' || field === 'termin') {
      const uwagi  = field === 'uwagi'  ? val : old.uwagi;
      const termin = field === 'termin' ? val : old.termin;
      if (!uwagi.trim()) {
        upd.ocena = old.uwagi.trim() ? 'green' : old.ocena;
      } else {
        upd.ocena = computeOcena(uwagi, termin);
      }
    }
    saveCardToSupabase(di, si, upd);
    return { ...prev, [key]: upd };
  });
}, [saveCardToSupabase]);

const updateStatsNote = useCallback((key, val) => {
  setStatsNotes(prev => ({ ...prev, [key]: val }));
  saveNoteToSupabase(key, val);
}, [saveNoteToSupabase]);

  const clearMonth = async () => {
  await supabaseClient
    .from('kamishibai_cards')
    .delete()
    .eq('year', year)
    .eq('month', month);

  await supabaseClient
    .from('kamishibai_config')
    .delete()
    .eq('year', year)
    .eq('month', month);

  await supabaseClient
    .from('kamishibai_notes')
    .delete()
    .eq('year', year)
    .eq('month', month);

  setCells(initCells());
  setDyzurny('');
  setConfirmClear(false);
};

  const saveAudit = useCallback((auditNum, clearAfter) => {
    const snapshot = {
      cells:      JSON.parse(JSON.stringify(cells)),
      dyzurny,
      savedAt:    new Date().toISOString(),
      month,
      year,
    };
    setAuditArchive(prev => {
      const next = { ...prev };
      if (!next[year])        next[year]        = {};
      if (!next[year][month]) next[year][month] = {};
      next[year][month][auditNum] = snapshot;
      return next;
    });
    if (clearAfter) { setCells(initCells()); setDyzurny(''); }
    setShowAuditSave(false);
  }, [cells, dyzurny, month, year]);
  const deleteAudit = useCallback((yr, mo, auditNum) => {
    setAuditArchive(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      if (next[yr]?.[mo]?.[auditNum]) {
        delete next[yr][mo][auditNum];
        if (Object.keys(next[yr][mo]).length === 0) delete next[yr][mo];
        if (Object.keys(next[yr]).length === 0) delete next[yr];
      }
      return next;
    });
  }, []);

  const restoreAudit = useCallback((snapshot) => {
    if (window.confirm(`Przywrócić Audyt ${snapshot.month !== undefined ? MONTHS[snapshot.month] : ''} na tablicę?\n\nAktualna zawartość tablicy zostanie nadpisana.`)) {
      setCells(snapshot.cells);
      setDyzurny(snapshot.dyzurny || '');
      setShowStats(false);
    }
  }, []);

  const prevMonth  = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };

  return (
  <div className="k-root">

    {loading && (
      <div style={{
        position:'fixed', inset:0, background:'rgba(15,23,42,0.85)',

      }}>
        <div style={{ width:48, height:48, border:'4px solid #334155',

      </div>
    )}

    {/* ═══ HEADER ═══ */}

      <header className="k-header">

        <div className="k-divider" />

        <div className="k-month-nav">

        </div>

        <div className="k-spacer" />

        <div className="k-legend">

              <tr className="tr-dyzurny">
                <td colSpan={2} className="td-dyz-label">Dyżurny</td>

                    <strong style={{ fontStyle:'normal', opacity:1 }}>© 2026 Piotr Mieczkowski. All rights reserved.</strong>
                  </span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      {/* ═══ STATS MODAL ═══ */}
