<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablica Kamishibai</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>* { box-sizing: border-box; } body { margin: 0; padding: 0; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useCallback, useRef, useEffect } = React;


const DAYS    = ['Poniedziałek','Wtorek','Środa','Czwartek','Piątek','Sobota','Niedziela'];
const SUBS    = ['I','II','III'];
const MONTHS  = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
const OC_CYCLE = ['','green','yellow','red'];
const OC_BG    = { '':'#d1d5db', green:'#16a34a', yellow:'#ca8a04', red:'#dc2626' };
const OC_RING  = { '':'#9ca3af', green:'#22c55e', yellow:'#eab308', red:'#ef4444' };
const OC_LABEL = { '':'—',       green:'OK',       yellow:'Uwaga',   red:'Problem' };

const now = new Date();

function initCells() {
  const c = {};
  DAYS.forEach((_,di) => SUBS.forEach((_,si) => {
    c[`${di}_${si}`] = { o1:'',o2:'',o3:'',o4:'',uwagi:'',dzialania:'',kto:'',termin:'',ocena:'' };
  }));
  return c;
}

/* ─── Editable textarea cell ─── */
function Cell({ value, onChange, placeholder }) {
  return (
    <textarea
      value={value}
      onChange={e => onChange(e.target.value)}
      placeholder={placeholder}
      rows={1}
      className="cell-input"
      onFocus={e  => e.target.classList.add('cell-focus')}
      onBlur={e   => e.target.classList.remove('cell-focus')}
      onInput={e  => { e.target.style.height='auto'; e.target.style.height=e.target.scrollHeight+'px'; }}
    />
  );
}

/* ─── Color status button ─── */
function OcenaBtn({ value, onChange }) {
  const cycle = () => onChange(OC_CYCLE[(OC_CYCLE.indexOf(value)+1) % OC_CYCLE.length]);
  return (
    <div className="ocena-wrap">
      <button
        onClick={cycle}
        title={`Ocena: ${OC_LABEL[value] || 'nie ustawiona'}`}
        className="ocena-btn"
        style={{ background: OC_BG[value], borderColor: OC_RING[value] }}
      />
      {value && <span className="ocena-lbl" style={{ color: OC_RING[value] }}>{OC_LABEL[value]}</span>}
    </div>
  );
}

/* ─── Editable area column header ─── */
function AreaHeader({ value, onChange }) {
  const [editing, setEditing] = useState(false);
  const [draft,   setDraft]   = useState(value);
  const save = () => { onChange(draft || value); setEditing(false); };
  if (editing) return (
    <input autoFocus value={draft} className="area-input"
      onChange={e => setDraft(e.target.value)}
      onBlur={save}
      onKeyDown={e => { if(e.key==='Enter') save(); if(e.key==='Escape') setEditing(false); }}
    />
  );
  return (
    <div className="area-header" onClick={() => { setDraft(value); setEditing(true); }} title="Kliknij aby zmienić nazwę obszaru">
      <span className="area-name">{value}</span>
      <span className="area-edit-hint">✎ edytuj</span>
    </div>
  );
}

/* ─── Main app ─── */
function App() {
  const [month, setMonth]           = useState(now.getMonth());
  const [year,  setYear]            = useState(now.getFullYear());
  const [areaLabels, setAreaLabels] = useState({ o1:'OBSZAR 1',o2:'OBSZAR 2',o3:'OBSZAR 3',o4:'OBSZAR 4' });
  const [cells, setCells]           = useState(initCells);
  const [dyzurny, setDyzurny]       = useState('');
  const [confirmClear, setConfirmClear] = useState(false);

  const updateCell = useCallback((di,si,field,val) => {
    setCells(prev => ({ ...prev, [`${di}_${si}`]: { ...prev[`${di}_${si}`], [field]:val } }));
  }, []);

  const clearMonth = () => { setCells(initCells()); setDyzurny(''); setConfirmClear(false); };
  const prevMonth  = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const nextMonth  = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };

  return (
    <div className="k-root">

      {/* ═══ HEADER ═══ */}
      <header className="k-header">

        <div className="k-title-block">
          <span className="k-sup">Tablica</span>
          <span className="k-title">Kamishibai</span>
        </div>

        <div className="k-divider" />

        <div className="k-month-nav">
          <button className="k-nav-btn" onClick={prevMonth}>‹</button>
          <span className="k-month-label">{MONTHS[month].toUpperCase()} {year}</span>
          <button className="k-nav-btn" onClick={nextMonth}>›</button>
        </div>

        <div className="k-spacer" />

        <div className="k-legend">
          {[['#22c55e','OK'],['#eab308','Uwaga'],['#ef4444','Problem']].map(([c,l]) => (
            <div key={l} className="k-legend-item">
              <span className="k-legend-dot" style={{ background:c }} />
              <span className="k-legend-text">{l}</span>
            </div>
          ))}
        </div>

        {confirmClear ? (
          <div className="k-confirm">
            <span className="k-confirm-text">Na pewno wyczyścić?</span>
            <button className="k-btn k-btn-danger" onClick={clearMonth}>Tak, wyczyść</button>
            <button className="k-btn k-btn-cancel" onClick={() => setConfirmClear(false)}>Anuluj</button>
          </div>
        ) : (
          <button className="k-btn k-btn-clear" onClick={() => setConfirmClear(true)}>
            🗑 Wyczyść miesiąc
          </button>
        )}
      </header>

      {/* ═══ TABLE ═══ */}
      <div className="k-table-wrap">
        <table className="k-table">
          <colgroup>
            <col className="col-day" />
            <col className="col-sub" />
            <col className="col-area" />
            <col className="col-area" />
            <col className="col-area" />
            <col className="col-area" />
            <col className="col-text" />
            <col className="col-text" />
            <col className="col-kto" />
            <col className="col-oc" />
            <col className="col-tr" />
          </colgroup>

          <thead>
            <tr>
              <th className="th-base" colSpan={2}>Dzień</th>
              {['o1','o2','o3','o4'].map(k => (
                <th key={k} className="th-area">
                  <AreaHeader value={areaLabels[k]} onChange={v => setAreaLabels(p=>({...p,[k]:v}))} />
                </th>
              ))}
              <th className="th-base">Uwagi</th>
              <th className="th-base">Działania</th>
              <th className="th-base">Kto</th>
              <th className="th-base">Ocena</th>
              <th className="th-base">Termin</th>
            </tr>
          </thead>

          <tbody>
            {DAYS.map((day,di) => SUBS.map((sub,si) => {
              const cell   = cells[`${di}_${si}`];
              const isLast = si === 2;
              return (
                <tr key={`${di}-${si}`} className={`tr-data ${si===1?'tr-mid':''} ${isLast?'tr-last':''}`}>
                  {si===0 && (
                    <td rowSpan={3} className="td-day">{day}</td>
                  )}
                  <td className="td-sub">{sub}</td>
                  {['o1','o2','o3','o4'].map(f => (
                    <td key={f} className="td-area">
                      <Cell value={cell[f]} onChange={v=>updateCell(di,si,f,v)} placeholder="" />
                    </td>
                  ))}
                  <td className="td-data">
                    <Cell value={cell.uwagi} onChange={v=>updateCell(di,si,'uwagi',v)} placeholder="Uwagi..." />
                  </td>
                  <td className="td-data">
                    <Cell value={cell.dzialania} onChange={v=>updateCell(di,si,'dzialania',v)} placeholder="Działania..." />
                  </td>
                  <td className="td-data">
                    <Cell value={cell.kto} onChange={v=>updateCell(di,si,'kto',v)} placeholder="Imię" />
                  </td>
                  <td className="td-ocena">
                    <OcenaBtn value={cell.ocena} onChange={v=>updateCell(di,si,'ocena',v)} />
                  </td>
                  <td className="td-data">
                    <Cell value={cell.termin} onChange={v=>updateCell(di,si,'termin',v)} placeholder="dd.mm" />
                  </td>
                </tr>
              );
            }))}

            {/* ── Dyżurny ── */}
            <tr className="tr-dyzurny">
              <td colSpan={2} className="td-dyz-label">Dyżurny</td>
              <td colSpan={4} className="td-dyz-name">
                <textarea
                  className="dyz-input"
                  value={dyzurny}
                  onChange={e => setDyzurny(e.target.value)}
                  placeholder="Wpisz imię dyżurnego..."
                  rows={1}
                  onFocus={e  => e.target.style.background='#fef9c3'}
                  onBlur={e   => e.target.style.background='transparent'}
                />
              </td>
              <td colSpan={5} className="td-dyz-empty" />
            </tr>
          </tbody>
        </table>
      </div>

      {/* ═══ STYLES ═══ */}
      <style>{`
        /* ── Root: fluid typography 23"→50" ─────────────────────── */
        .k-root {
          font-size: clamp(0.8125rem, 0.85vw, 1.0625rem);
          font-family: 'Inter', 'Segoe UI', sans-serif;
          background: #f5f0e8;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          box-sizing: border-box;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; }

        /* ── Header ──────────────────────────────────────────────── */
        .k-header {
          background: #1e293b;
          border-bottom: 3px solid #0f172a;
          padding: 0.875rem 1.75rem;
          display: flex;
          align-items: center;
          gap: 1.25rem;
          flex-shrink: 0;
          flex-wrap: nowrap;
        }
        .k-title-block {
          display: flex;
          flex-direction: column;
          flex-shrink: 0;
        }
        .k-sup {
          font-size: 0.625rem;
          letter-spacing: 0.2em;
          color: #64748b;
          text-transform: uppercase;
          margin-bottom: 0.2rem;
        }
        .k-title {
          font-size: clamp(1.25rem, 1.6vw, 2rem);
          font-weight: 900;
          letter-spacing: 0.2em;
          text-transform: uppercase;
          color: #f1f5f9;
          line-height: 1;
        }
        .k-divider {
          width: 1px;
          height: 3.5rem;
          background: #334155;
          flex-shrink: 0;
        }
        .k-month-nav {
          display: flex;
          align-items: center;
          gap: 0.75rem;
          flex-shrink: 0;
        }
        .k-nav-btn {
          background: #334155;
          color: #38bdf8;
          border: 1px solid #475569;
          border-radius: 0.4rem;
          width: 2.5rem;
          height: 2.5rem;
          font-size: 1.375rem;
          font-weight: 900;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          flex-shrink: 0;
          transition: background 0.15s;
        }
        .k-nav-btn:hover { background: #475569; }
        .k-month-label {
          font-size: clamp(1.5rem, 2.2vw, 2.75rem);
          font-weight: 900;
          color: #38bdf8;
          letter-spacing: 0.04em;
          min-width: 16rem;
          text-align: center;
        }
        .k-spacer { flex: 1; }
        .k-legend {
          display: flex;
          gap: 0.875rem;
          align-items: center;
          margin-right: 1.25rem;
          flex-shrink: 0;
        }
        .k-legend-item { display: flex; align-items: center; gap: 0.35rem; }
        .k-legend-dot {
          width: 0.7rem;
          height: 0.7rem;
          border-radius: 50%;
          flex-shrink: 0;
        }
        .k-legend-text { font-size: 0.75rem; color: #94a3b8; font-weight: 500; }

        /* Clear button */
        .k-btn {
          border-radius: 0.375rem;
          padding: 0.5rem 1rem;
          font-size: 0.75rem;
          cursor: pointer;
          font-weight: 600;
          letter-spacing: 0.03em;
          white-space: nowrap;
          font-family: inherit;
          transition: background 0.15s;
        }
        .k-btn-clear {
          background: transparent;
          color: #f87171;
          border: 1px solid #7f1d1d;
          flex-shrink: 0;
        }
        .k-btn-clear:hover { background: rgba(220,38,38,0.15); }
        .k-btn-danger {
          background: #dc2626;
          color: white;
          border: 1px solid #ef4444;
        }
        .k-btn-cancel {
          background: transparent;
          color: #94a3b8;
          border: 1px solid #475569;
        }
        .k-confirm {
          display: flex;
          gap: 0.5rem;
          align-items: center;
          flex-shrink: 0;
        }
        .k-confirm-text { font-size: 0.75rem; color: #fbbf24; font-weight: 600; }

        /* ── Table wrapper ───────────────────────────────────────── */
        .k-table-wrap {
          flex: 1;
          overflow: auto;
          padding-bottom: 0.75rem;
        }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #e8e2d4; }
        ::-webkit-scrollbar-thumb { background: #a8a29e; border-radius: 3px; }

        /* ── Table ───────────────────────────────────────────────── */
        .k-table {
          width: 100%;
          border-collapse: collapse;
          table-layout: fixed;
        }
        .col-day  { width: 2.4rem; }
        .col-sub  { width: 1.6rem; }
        .col-area { width: 8%; }
        .col-text { width: 14%; }
        .col-kto  { width: 8%; }
        .col-oc   { width: 5.5rem; }
        .col-tr   { width: 6rem; }

        /* ── Table headers ───────────────────────────────────────── */
        .th-base, .th-area {
          background: #1e293b;
          color: #e2e8f0;
          font-size: 0.625rem;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          padding: 0.5rem 0.375rem;
          text-align: center;
          font-weight: 600;
          border-right: 1px solid #334155;
          border-bottom: 1px solid #334155;
          white-space: nowrap;
        }
        .th-area { padding: 0.4rem 0.25rem; }

        .area-header {
          cursor: pointer;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 0.15rem;
          padding: 0.1rem 0;
        }
        .area-name {
          font-size: 0.7rem;
          font-weight: 700;
          letter-spacing: 0.05em;
          color: #f1f5f9;
        }
        .area-edit-hint { font-size: 0.575rem; color: #64748b; }
        .area-input {
          width: 100%;
          background: white;
          color: #1e293b;
          border: 1px solid #2563eb;
          border-radius: 3px;
          padding: 0.15rem 0.35rem;
          font-size: 0.7rem;
          font-family: inherit;
          text-transform: uppercase;
          letter-spacing: 0.04em;
          text-align: center;
        }

        /* ── Table rows ──────────────────────────────────────────── */
        .tr-data { background: #f5f0e8; }
        .tr-mid  { background: #ede8dc; }
        .tr-last td { border-bottom: 2px solid #c4b99a; }

        .td-day {
          background: #1e293b;
          border-right: 2px solid #334155;
          border-bottom: 2px solid #c4b99a;
          writing-mode: vertical-rl;
          transform: rotate(180deg);
          text-align: center;
          color: #94a3b8;
          font-size: 0.625rem;
          font-weight: 700;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          padding: 0.375rem 0.2rem;
          vertical-align: middle;
        }
        .td-sub {
          background: #e8e2d4;
          text-align: center;
          color: #78716c;
          font-size: 0.625rem;
          font-weight: 700;
          border-right: 1px solid #d4c9b0;
          border-bottom: 1px solid #d4c9b0;
          vertical-align: middle;
          padding: 0;
        }
        .td-area, .td-data {
          border-right: 1px solid #d4c9b0;
          border-bottom: 1px solid #d4c9b0;
          vertical-align: middle;
          padding: 0;
        }
        .td-ocena {
          border-right: 1px solid #d4c9b0;
          border-bottom: 1px solid #d4c9b0;
          vertical-align: middle;
          text-align: center;
          padding: 0.25rem 0.375rem;
        }

        /* ── Cell input ──────────────────────────────────────────── */
        .cell-input {
          width: 100%;
          background: transparent;
          border: none;
          outline: none;
          resize: none;
          font-family: inherit;
          font-size: 0.8125rem;
          color: #1e293b;
          padding: 0.25rem 0.375rem;
          line-height: 1.4;
          overflow-y: hidden;
          min-height: 1.75rem;
          display: block;
        }
        .cell-input::placeholder { color: #a8a29e; font-style: italic; }
        .cell-focus {
          background: #fef9c3 !important;
          border-radius: 3px;
          outline: none !important;
        }

        /* ── Ocena ───────────────────────────────────────────────── */
        .ocena-wrap {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 0.15rem;
        }
        .ocena-btn {
          width: 1.875rem;
          height: 1.875rem;
          border-radius: 50%;
          border-width: 2px;
          border-style: solid;
          cursor: pointer;
          transition: transform 0.12s;
          flex-shrink: 0;
        }
        .ocena-btn:hover  { transform: scale(1.18); }
        .ocena-btn:active { transform: scale(0.88); }
        .ocena-lbl {
          font-size: 0.6rem;
          font-weight: 700;
          letter-spacing: 0.02em;
        }

        /* ── Dyżurny row ─────────────────────────────────────────── */
        .tr-dyzurny { background: #fef3c7; }
        .td-dyz-label {
          border-top: 3px solid #f59e0b;
          background: #fde68a;
          text-align: center;
          color: #92400e;
          font-size: 0.75rem;
          font-weight: 800;
          letter-spacing: 0.06em;
          text-transform: uppercase;
          padding: 0.5rem 0.25rem;
          border-right: 1px solid #d4c9b0;
          vertical-align: middle;
        }
        .td-dyz-name {
          border-top: 3px solid #f59e0b;
          padding: 0.25rem 0.5rem;
          border-right: 1px solid #d4c9b0;
          vertical-align: middle;
        }
        .td-dyz-empty {
          border-top: 3px solid #f59e0b;
          background: #fef3c7;
        }
        .dyz-input {
          width: 100%;
          background: transparent;
          border: none;
          outline: none;
          resize: none;
          font-family: inherit;
          font-size: 0.875rem;
          color: #78350f;
          font-weight: 700;
          padding: 0.15rem 0.25rem;
          line-height: 1.4;
        }
        .dyz-input::placeholder { color: #b45309; font-style: italic; }

        /* ── Focus ring ──────────────────────────────────────────── */
        input:focus, textarea:focus {
          outline: 2px solid #3b82f6 !important;
        }

        /* ── Desktop breakpoints (monitor sizes only) ────────────── */
        @media (min-width: 2560px) {
          .k-root { font-size: clamp(1rem, 0.7vw, 1.1875rem); }
        }
        @media (min-width: 3200px) {
          .k-root { font-size: clamp(1.0625rem, 0.65vw, 1.25rem); }
        }
      `}</style>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
