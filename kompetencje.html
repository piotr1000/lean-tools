<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matryca Kompetencji</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>* { box-sizing: border-box; } body { margin: 0; padding: 0; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect } = React;


const RATING_CONFIG = {
  0: { label: "Nie dotyczy",           bg: "#e5e7eb", text: "#9ca3af", border: "#d1d5db" },
  1: { label: "Pełne wsparcie dozoru", bg: "#fee2e2", text: "#b91c1c", border: "#fca5a5" },
  2: { label: "Częściowe wsparcie",    bg: "#ffedd5", text: "#c2410c", border: "#fdba74" },
  3: { label: "Samodzielnie",          bg: "#dcfce7", text: "#15803d", border: "#86efac" },
  4: { label: "Może szkolić innych",   bg: "#16a34a", text: "#ffffff", border: "#15803d" },
};

const DOT_COLORS = { 0:"#d1d5db", 1:"#ef4444", 2:"#f97316", 3:"#22c55e", 4:"#15803d" };

const DEFAULT_SKILLS = [
  "Przyjmowanie dostaw", "Kompletacja\n(Picking)", "Obsługa\nWMS/ERP",
  "Inwentaryzacja", "Zasady\nSkładowania", "Obsługa\nSprzętu",
  "Wózki widłowe\n(UDT)", "Szkolenie\nBHP", "Praca pod\npresją", "Komunikat-\nywność",
];

const DEFAULT_EMPLOYEES = [
  { name: "Jan Kowalski",     role: "Operator" },
  { name: "Anna Nowak",       role: "Operator" },
  { name: "Teresa Koźlowska", role: "Lider" },
  { name: "Piotr Tokarz",     role: "Operator" },
];

function seedData(employees, skills) {
  return employees.map(() => skills.map(() => Math.floor(Math.random() * 5)));
}

// ── Editable text ─────────────────────────────────────────────────────────
function Editable({ value, onChange, style, placeholder, multiline }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value);
  const ref = useRef(null);
  useEffect(() => { setDraft(value); }, [value]);
  useEffect(() => { if (editing && ref.current) ref.current.focus(); }, [editing]);
  const commit = () => { setEditing(false); onChange(draft.trim() || value); };
  const shared = {
    style: {
      fontFamily: "inherit", fontSize: "inherit", fontWeight: "inherit",
      color: "#0f172a", background: "#fff", border: "2px solid #0ea5e9",
      borderRadius: 4, padding: "2px 6px", outline: "none",
      width: "100%", maxWidth: "100%", boxSizing: "border-box",
      resize: "none", overflow: "hidden",
    },
    onBlur: commit,
    onKeyDown: e => {
      if (e.key === "Enter" && !e.shiftKey) commit();
      if (e.key === "Escape") { setDraft(value); setEditing(false); }
    },
  };
  if (editing) return multiline
    ? <textarea ref={ref} rows={2} value={draft} onChange={e => setDraft(e.target.value)} {...shared} />
    : <input ref={ref} value={draft} onChange={e => setDraft(e.target.value)} {...shared} />;
  return (
    <span style={{ ...style, cursor: "text", whiteSpace: "pre-line" }}
      onDoubleClick={() => setEditing(true)} title="Kliknij dwukrotnie, aby edytować">
      {value || <span style={{ opacity: 0.35, fontStyle: "italic" }}>{placeholder}</span>}
    </span>
  );
}

// ── Rating cell ───────────────────────────────────────────────────────────
function RatingCell({ value, onChange, compareValue }) {
  const cfg = RATING_CONFIG[value];
  const [hovered, setHovered] = useState(false);

  // gap indicator vs compare value
  let gapDot = null;
  if (compareValue !== undefined && compareValue !== null && compareValue !== value) {
    const diff = value - compareValue;
    gapDot = (
      <div style={{
        position: "absolute", top: -5, right: -5,
        width: 14, height: 14, borderRadius: "50%",
        background: diff > 0 ? "#16a34a" : "#ef4444",
        border: "2px solid #fff",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 8, fontWeight: 900, color: "#fff", lineHeight: 1,
      }}>{diff > 0 ? "▲" : "▼"}</div>
    );
  }

  return (
    <div style={{ position: "relative", display: "inline-block" }}>
      <div
        onClick={() => onChange((value + 1) % 5)}
        onMouseEnter={() => setHovered(true)}
        onMouseLeave={() => setHovered(false)}
        title={`${value} – ${cfg.label}\nKliknij, aby zmienić`}
        style={{
          width: 42, height: 42, borderRadius: 8,
          background: cfg.bg, color: cfg.text, border: `2px solid ${cfg.border}`,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 17, fontWeight: 800, cursor: "pointer",
          transform: hovered ? "scale(1.18)" : "scale(1)",
          boxShadow: hovered ? "0 4px 14px rgba(0,0,0,0.15)" : "0 1px 3px rgba(0,0,0,0.07)",
          transition: "transform 0.12s, box-shadow 0.12s",
          userSelect: "none",
        }}
      >{value}</div>
      {gapDot}
    </div>
  );
}

// ── Legend ────────────────────────────────────────────────────────────────
function Legend() {
  return (
    <div style={{ padding: "14px 16px" }}>
      <div style={{ fontSize: 10, fontWeight: 700, color: "#64748b", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 10 }}>
        Klasyfikacja kompetencji
      </div>
      {Object.entries(RATING_CONFIG).map(([k, v]) => (
        <div key={k} style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 6 }}>
          <div style={{
            width: 30, height: 30, borderRadius: 6, flexShrink: 0,
            background: v.bg, color: v.text, border: `2px solid ${v.border}`,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 14, fontWeight: 800,
          }}>{k}</div>
          <span style={{ fontSize: 11, color: "#334155", lineHeight: 1.35 }}>{v.label}</span>
        </div>
      ))}
      <div style={{ marginTop: 10, paddingTop: 8, borderTop: "1px solid #e2e8f0", fontSize: 10, color: "#94a3b8", lineHeight: 1.7 }}>
        🖱 Kliknij komórkę — zmień ocenę<br />
        ✏️ Dwuklik nazwy — edytuj tekst
      </div>
    </div>
  );
}

// ── Matrix Table (reusable) ───────────────────────────────────────────────
function MatrixTable({
  accentColor, headerBg, label, sublabel, icon,
  employees, skills, data, compareData,
  onRatingChange, onSkillChange, onEmployeeChange,
  onAddRow, onRemoveRow, onAddCol, onRemoveCol,
  showStats, readonly,
}) {
  const rowAvg = data.map(row => {
    const v = row.filter(x => x > 0);
    return v.length ? v.reduce((a, b) => a + b, 0) / v.length : null;
  });
  const colAvg = skills.map((_, ci) => {
    const v = data.map(r => r[ci]).filter(x => x > 0);
    return v.length ? v.reduce((a, b) => a + b, 0) / v.length : null;
  });

  return (
    <div style={{ marginBottom: 0 }}>
      {/* Section header */}
      <div style={{
        background: headerBg,
        borderRadius: "12px 12px 0 0",
        padding: "13px 20px",
        display: "flex", alignItems: "center", gap: 12,
      }}>
        <span style={{ fontSize: 20 }}>{icon}</span>
        <div>
          <div style={{ color: "#fff", fontWeight: 800, fontSize: 14, letterSpacing: "0.04em" }}>
            {label}
          </div>
          <div style={{ color: "rgba(255,255,255,0.65)", fontSize: 11, marginTop: 1 }}>
            {sublabel}
          </div>
        </div>
        {compareData && (
          <div style={{
            marginLeft: "auto", display: "flex", alignItems: "center", gap: 12,
            fontSize: 11, color: "rgba(255,255,255,0.75)",
          }}>
            <span>▲ <span style={{ color: "#86efac" }}>wyżej niż samoocena</span></span>
            <span>▼ <span style={{ color: "#fca5a5" }}>niżej niż samoocena</span></span>
          </div>
        )}
      </div>

      {/* Table card */}
      <div style={{
        background: "#fff",
        borderRadius: "0 0 12px 12px",
        border: `1px solid ${accentColor}33`,
        borderTop: "none",
        boxShadow: "0 4px 16px rgba(0,0,0,0.08)",
        overflow: "hidden",
      }}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ borderCollapse: "collapse", tableLayout: "fixed", minWidth: "100%" }}>
            <colgroup>
              <col style={{ width: 36 }} />
              <col style={{ width: 175 }} />
              <col style={{ width: 80 }} />
              {skills.map((_, i) => <col key={i} style={{ width: 70 }} />)}
              {showStats && <col style={{ width: 60 }} />}
              {!readonly && <col style={{ width: 44 }} />}
            </colgroup>
            <thead>
              <tr>
                <td colSpan={3} style={{
                  background: "#f8fafc", verticalAlign: "top", padding: 0,
                  borderBottom: 0, borderRight: "2px solid #cbd5e1",
                }}>
                  <Legend />
                </td>
                {skills.map((skill, ci) => (
                  <th key={ci} style={{
                    padding: "8px 4px 0px", background: "#f8fafc",
                    borderBottom: "2px solid #e2e8f0", borderRight: "1px solid #e2e8f0",
                    verticalAlign: "bottom", textAlign: "center",
                    overflow: "hidden", position: "relative",
                  }}>
                    <div style={{
                      display: "flex", flexDirection: "column", alignItems: "center",
                      gap: 4, height: 180, paddingBottom: 22, overflow: "hidden",
                    }}>
                      {!readonly && (
                        <button onClick={() => onRemoveCol(ci)} disabled={skills.length <= 1} style={{
                          background: "#fee2e2", border: "1px solid #fca5a5",
                          borderRadius: 4, color: "#b91c1c",
                          cursor: skills.length <= 1 ? "not-allowed" : "pointer",
                          fontSize: 9, padding: "2px 5px", fontWeight: 700,
                          opacity: skills.length <= 1 ? 0.3 : 1, flexShrink: 0,
                        }}>✕</button>
                      )}
                      <div style={{
                        writingMode: "vertical-rl", transform: "rotate(180deg)",
                        flex: 1, display: "flex", alignItems: "center",
                        justifyContent: "center", overflow: "hidden", maxHeight: "100%",
                      }}>
                        <Editable
                          value={skill} onChange={v => onSkillChange(ci, v)}
                          placeholder="Kompetencja" multiline
                          style={{ fontSize: 11, fontWeight: 600, color: "#334155", textAlign: "center", lineHeight: 1.4, maxWidth: 130, overflow: "hidden" }}
                        />
                      </div>
                      {showStats && colAvg[ci] !== null && (
                        <div style={{
                          width: 8, height: `${(colAvg[ci] / 4) * 32}px`,
                          background: DOT_COLORS[Math.round(colAvg[ci])],
                          borderRadius: 4, flexShrink: 0, transition: "height 0.3s", minHeight: 2,
                        }} />
                      )}
                    </div>
                  </th>
                ))}
                {showStats && (
                  <th style={{
                    background: "#f8fafc", borderBottom: "2px solid #e2e8f0",
                    borderLeft: "2px solid #cbd5e1", padding: 4, verticalAlign: "bottom", textAlign: "center",
                  }}>
                    <div style={{ writingMode: "vertical-rl", transform: "rotate(180deg)", fontSize: 9, fontWeight: 700, color: "#94a3b8", letterSpacing: "0.08em" }}>ŚR</div>
                  </th>
                )}
                {!readonly && <th style={{ background: "#f8fafc", borderBottom: "2px solid #e2e8f0" }} />}
              </tr>

              {/* Column labels */}
              <tr>
                <td style={{ background: "#f0f4f8", borderBottom: "2px solid #e2e8f0", borderRight: "1px solid #e2e8f0", padding: "6px 4px", textAlign: "center" }}>
                  <span style={{ fontSize: 9, fontWeight: 700, color: "#94a3b8", letterSpacing: "0.08em", textTransform: "uppercase" }}>#</span>
                </td>
                <td style={{ background: "#f0f4f8", borderBottom: "2px solid #e2e8f0", borderRight: "1px solid #e2e8f0", padding: "6px 12px" }}>
                  <span style={{ fontSize: 10, fontWeight: 700, color: "#475569", letterSpacing: "0.08em", textTransform: "uppercase" }}>Imię i Nazwisko</span>
                </td>
                <td style={{ background: "#f0f4f8", borderBottom: "2px solid #e2e8f0", borderRight: "2px solid #cbd5e1", padding: "6px 8px", textAlign: "center" }}>
                  <span style={{ fontSize: 10, fontWeight: 700, color: "#475569", letterSpacing: "0.08em", textTransform: "uppercase" }}>Stanowisko</span>
                </td>
                {skills.map((_, ci) => (
                  <td key={ci} style={{ background: "#f0f4f8", borderBottom: "2px solid #e2e8f0", borderRight: "1px solid #e2e8f0" }} />
                ))}
                {showStats && <td style={{ background: "#f0f4f8", borderBottom: "2px solid #e2e8f0", borderLeft: "2px solid #cbd5e1" }} />}
                {!readonly && <td style={{ background: "#f0f4f8", borderBottom: "2px solid #e2e8f0" }} />}
              </tr>

              {showStats && (
                <tr style={{ background: "#f8fafc" }}>
                  <td colSpan={3} style={{
                    padding: "6px 12px", fontSize: 10, fontWeight: 700,
                    color: "#94a3b8", textAlign: "right", letterSpacing: "0.08em",
                    borderBottom: "1px solid #e2e8f0", borderRight: "2px solid #cbd5e1",
                  }}>ŚR. KOMPETENCJI →</td>
                  {colAvg.map((avg, ci) => {
                    const rnd = avg !== null ? Math.round(avg) : null;
                    const cfg = rnd !== null ? RATING_CONFIG[rnd] : null;
                    return (
                      <td key={ci} style={{
                        textAlign: "center", padding: "5px 3px",
                        borderBottom: "1px solid #e2e8f0", borderRight: "1px solid #e2e8f0",
                        fontSize: 12, fontWeight: 700,
                        background: cfg ? cfg.bg : "transparent",
                        color: cfg ? cfg.text : "#94a3b8",
                      }}>{avg !== null ? avg.toFixed(1) : "–"}</td>
                    );
                  })}
                  <td style={{ borderBottom: "1px solid #e2e8f0", borderLeft: "2px solid #cbd5e1" }} />
                  {!readonly && <td style={{ borderBottom: "1px solid #e2e8f0" }} />}
                </tr>
              )}
            </thead>

            <tbody>
              {employees.map((emp, ri) => {
                const avg = rowAvg[ri];
                const rnd = avg !== null ? Math.round(avg) : null;
                const avgCfg = rnd !== null ? RATING_CONFIG[rnd] : null;
                return (
                  <tr key={ri} style={{ background: ri % 2 === 0 ? "#fff" : "#f8fafc" }}>
                    <td style={{ textAlign: "center", fontSize: 12, fontWeight: 600, color: "#94a3b8", padding: "10px 4px", borderBottom: "1px solid #e2e8f0", borderRight: "1px solid #e2e8f0" }}>{ri + 1}</td>
                    <td style={{ padding: "10px 12px", borderBottom: "1px solid #e2e8f0", borderRight: "1px solid #e2e8f0" }}>
                      <Editable value={emp.name} onChange={v => onEmployeeChange(ri, "name", v)} placeholder="Imię Nazwisko"
                        style={{ fontSize: 13, fontWeight: 600, color: "#0f172a", display: "block" }} />
                    </td>
                    <td style={{ padding: "10px 8px", borderBottom: "1px solid #e2e8f0", borderRight: "2px solid #cbd5e1", textAlign: "center" }}>
                      <Editable value={emp.role} onChange={v => onEmployeeChange(ri, "role", v)} placeholder="Rola"
                        style={{ fontSize: 10, fontWeight: 700, color: "#475569", textTransform: "uppercase", letterSpacing: "0.06em" }} />
                    </td>
                    {(data[ri] || []).map((val, ci) => (
                      <td key={ci} style={{ padding: "8px 4px", textAlign: "center", borderBottom: "1px solid #e2e8f0", borderRight: "1px solid #e2e8f0" }}>
                        <RatingCell
                          value={val}
                          onChange={nv => onRatingChange(ri, ci, nv)}
                          compareValue={compareData ? (compareData[ri] || [])[ci] : undefined}
                        />
                      </td>
                    ))}
                    {showStats && (
                      <td style={{
                        padding: "8px 6px", textAlign: "center",
                        borderBottom: "1px solid #e2e8f0", borderLeft: "2px solid #cbd5e1",
                        fontSize: 13, fontWeight: 800,
                        background: avgCfg ? avgCfg.bg : "transparent",
                        color: avgCfg ? avgCfg.text : "#94a3b8",
                      }}>{avg !== null ? avg.toFixed(1) : "–"}</td>
                    )}
                    {!readonly && (
                      <td style={{ padding: "8px 4px", textAlign: "center", borderBottom: "1px solid #e2e8f0" }}>
                        <button onClick={() => onRemoveRow(ri)} disabled={employees.length <= 1} style={{
                          background: "#fee2e2", border: "1px solid #fca5a5",
                          borderRadius: 6, color: "#b91c1c",
                          cursor: employees.length <= 1 ? "not-allowed" : "pointer",
                          fontSize: 11, padding: "4px 7px", fontWeight: 700,
                          opacity: employees.length <= 1 ? 0.3 : 1,
                        }} title="Usuń pracownika">✕</button>
                      </td>
                    )}
                  </tr>
                );
              })}
              {!readonly && (
                <tr>
                  <td colSpan={3 + skills.length + (showStats ? 1 : 0) + 1} style={{ padding: "10px 12px" }}>
                    <button onClick={onAddRow} style={{
                      width: "100%", background: "transparent",
                      border: "2px dashed #cbd5e1", borderRadius: 8,
                      color: "#64748b", cursor: "pointer", padding: "10px",
                      fontSize: 13, fontWeight: 600,
                      display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
                      transition: "all 0.15s",
                    }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = "#0ea5e9"; e.currentTarget.style.color = "#0ea5e9"; e.currentTarget.style.background = "#f0f9ff"; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = "#cbd5e1"; e.currentTarget.style.color = "#64748b"; e.currentTarget.style.background = "transparent"; }}
                    ><span style={{ fontSize: 16 }}>＋</span> Dodaj pracownika</button>
                  </td>
                </tr>
              )}
            </tbody>
          </table>
        </div>

        {!readonly && (
          <div style={{ padding: "10px 12px 14px", borderTop: "1px solid #e2e8f0", display: "flex", justifyContent: "flex-end" }}>
            <button onClick={onAddCol} style={{
              background: "transparent", border: "2px dashed #cbd5e1",
              borderRadius: 8, color: "#64748b", cursor: "pointer",
              padding: "8px 20px", fontSize: 13, fontWeight: 600,
              display: "flex", alignItems: "center", gap: 8, transition: "all 0.15s",
            }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = "#22c55e"; e.currentTarget.style.color = "#15803d"; e.currentTarget.style.background = "#f0fdf4"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = "#cbd5e1"; e.currentTarget.style.color = "#64748b"; e.currentTarget.style.background = "transparent"; }}
            ><span style={{ fontSize: 16 }}>＋</span> Dodaj kompetencję</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Gap Analysis ──────────────────────────────────────────────────────────
function GapAnalysis({ employees, skills, selfData, managerData }) {
  return (
    <div style={{
      background: "#fff", borderRadius: 12,
      border: "1px solid #e2e8f0",
      boxShadow: "0 2px 12px rgba(0,0,0,0.06)",
      overflow: "hidden", marginTop: 0,
    }}>
      <div style={{
        background: "linear-gradient(90deg, #7c3aed, #6d28d9)",
        padding: "13px 20px",
        display: "flex", alignItems: "center", gap: 12,
      }}>
        <span style={{ fontSize: 20 }}>🔍</span>
        <div>
          <div style={{ color: "#fff", fontWeight: 800, fontSize: 14, letterSpacing: "0.04em" }}>ANALIZA RÓŻNIC (GAP)</div>
          <div style={{ color: "rgba(255,255,255,0.65)", fontSize: 11, marginTop: 1 }}>
            Porównanie samooceny pracownika z oceną przełożonego
          </div>
        </div>
        <div style={{ marginLeft: "auto", display: "flex", gap: 16, fontSize: 11 }}>
          <span style={{ color: "rgba(255,255,255,0.8)" }}>
            <span style={{ color: "#86efac", fontWeight: 700 }}>▲ zielony</span> = pracownik zawyża samoocenę
          </span>
          <span style={{ color: "rgba(255,255,255,0.8)" }}>
            <span style={{ color: "#fca5a5", fontWeight: 700 }}>▼ czerwony</span> = pracownik zaniża samoocenę
          </span>
        </div>
      </div>

      <div style={{ overflowX: "auto" }}>
        <table style={{ borderCollapse: "collapse", tableLayout: "fixed", minWidth: "100%", width: "100%" }}>
          <colgroup>
            <col style={{ width: 36 }} />
            <col style={{ width: 175 }} />
            {skills.map((_, i) => <col key={i} style={{ width: 70 }} />)}
            <col style={{ width: 80 }} />
          </colgroup>
          <thead>
            <tr>
              <th style={{ background: "#f8fafc", borderBottom: "2px solid #e2e8f0", borderRight: "1px solid #e2e8f0", padding: "8px 4px", textAlign: "center", fontSize: 9, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase" }}>#</th>
              <th style={{ background: "#f8fafc", borderBottom: "2px solid #e2e8f0", borderRight: "2px solid #cbd5e1", padding: "8px 12px", fontSize: 10, fontWeight: 700, color: "#475569", textTransform: "uppercase", letterSpacing: "0.08em", textAlign: "left" }}>Pracownik</th>
              {skills.map((skill, ci) => (
                <th key={ci} style={{
                  background: "#f8fafc", borderBottom: "2px solid #e2e8f0",
                  borderRight: "1px solid #e2e8f0", padding: "4px 2px",
                  textAlign: "center", overflow: "hidden",
                }}>
                  <div style={{ writingMode: "vertical-rl", transform: "rotate(180deg)", fontSize: 10, fontWeight: 600, color: "#64748b", whiteSpace: "pre-line", lineHeight: 1.3 }}>
                    {skill.replace(/\n/g, " ")}
                  </div>
                </th>
              ))}
              <th style={{ background: "#f8fafc", borderBottom: "2px solid #e2e8f0", borderLeft: "2px solid #cbd5e1", padding: "8px 6px", textAlign: "center", fontSize: 9, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase" }}>WYNIK</th>
            </tr>
          </thead>
          <tbody>
            {employees.map((emp, ri) => {
              const selfRow    = selfData[ri]    || [];
              const managerRow = managerData[ri] || [];
              let totalGap = 0, gapCount = 0;
              skills.forEach((_, ci) => {
                const s = selfRow[ci] ?? 0;
                const m = managerRow[ci] ?? 0;
                if (s > 0 || m > 0) { totalGap += (m - s); gapCount++; }
              });
              const avgGap = gapCount ? (totalGap / gapCount) : 0;
              const gapLabel = avgGap > 0.3 ? "Niedocenia się" : avgGap < -0.3 ? "Przecenia się" : "Zgodność";
              const gapColor = avgGap > 0.3 ? "#15803d" : avgGap < -0.3 ? "#b91c1c" : "#0369a1";
              const gapBg    = avgGap > 0.3 ? "#dcfce7"  : avgGap < -0.3 ? "#fee2e2"  : "#e0f2fe";

              return (
                <tr key={ri} style={{ background: ri % 2 === 0 ? "#fff" : "#f8fafc" }}>
                  <td style={{ textAlign: "center", fontSize: 12, fontWeight: 600, color: "#94a3b8", padding: "10px 4px", borderBottom: "1px solid #e2e8f0", borderRight: "1px solid #e2e8f0" }}>{ri + 1}</td>
                  <td style={{ padding: "10px 12px", borderBottom: "1px solid #e2e8f0", borderRight: "2px solid #cbd5e1", fontSize: 13, fontWeight: 600, color: "#0f172a" }}>{emp.name}</td>
                  {skills.map((_, ci) => {
                    const s = selfRow[ci] ?? 0;
                    const m = managerRow[ci] ?? 0;
                    const diff = m - s;
                    const hasData = s > 0 || m > 0;
                    return (
                      <td key={ci} style={{
                        padding: "8px 4px", textAlign: "center",
                        borderBottom: "1px solid #e2e8f0", borderRight: "1px solid #e2e8f0",
                      }}>
                        {hasData ? (
                          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                            <div style={{ display: "flex", gap: 3, justifyContent: "center", fontSize: 11 }}>
                              <span style={{ color: "#64748b" }} title="Samoocena">{s}</span>
                              <span style={{ color: "#94a3b8" }}>→</span>
                              <span style={{ color: "#0f172a", fontWeight: 700 }} title="Ocena przełożonego">{m}</span>
                            </div>
                            {diff !== 0 && (
                              <span style={{
                                fontSize: 10, fontWeight: 700,
                                color: diff > 0 ? "#15803d" : "#b91c1c",
                              }}>{diff > 0 ? `+${diff}` : diff}</span>
                            )}
                            {diff === 0 && <span style={{ fontSize: 10, color: "#94a3b8" }}>–</span>}
                          </div>
                        ) : (
                          <span style={{ fontSize: 11, color: "#d1d5db" }}>·</span>
                        )}
                      </td>
                    );
                  })}
                  <td style={{
                    padding: "8px 8px", textAlign: "center",
                    borderBottom: "1px solid #e2e8f0", borderLeft: "2px solid #cbd5e1",
                  }}>
                    <div style={{
                      background: gapBg, color: gapColor,
                      borderRadius: 20, padding: "3px 8px",
                      fontSize: 10, fontWeight: 700, whiteSpace: "nowrap",
                    }}>{gapLabel}</div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Dept Badge ────────────────────────────────────────────────────────────
function DeptBadge() {
  const [editing, setEditing] = useState(false);
  const [dept, setDept] = useState("Magazyn");
  const [draft, setDraft] = useState("Magazyn");
  const ref = useRef(null);
  useEffect(() => { if (editing && ref.current) ref.current.focus(); }, [editing]);
  const commit = () => { setEditing(false); setDept(draft.trim() || dept); };
  if (editing) return (
    <input ref={ref} value={draft} onChange={e => setDraft(e.target.value)} onBlur={commit}
      onKeyDown={e => { if (e.key === "Enter") commit(); if (e.key === "Escape") { setDraft(dept); setEditing(false); } }}
      style={{ background: "#0ea5e9", border: "2px solid #38bdf8", borderRadius: 6, color: "#fff", padding: "3px 10px", fontSize: 12, fontWeight: 600, outline: "none", width: 120, fontFamily: "inherit" }} />
  );
  return (
    <div onClick={() => { setDraft(dept); setEditing(true); }} title="Kliknij, aby zmienić nazwę działu"
      style={{ background: "#334155", color: "#e2e8f0", borderRadius: 6, padding: "3px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer", border: "1px solid #475569", display: "flex", alignItems: "center", gap: 6, transition: "background 0.15s", userSelect: "none" }}
      onMouseEnter={e => e.currentTarget.style.background = "#0ea5e9"}
      onMouseLeave={e => e.currentTarget.style.background = "#334155"}
    >✏️ {dept}</div>
  );
}

// ── MAIN ──────────────────────────────────────────────────────────────────
function App() {
  const [skills,    setSkills]    = useState(DEFAULT_SKILLS);
  const [employees, setEmployees] = useState(DEFAULT_EMPLOYEES);
  const [selfData,    setSelfData]    = useState(() => seedData(DEFAULT_EMPLOYEES, DEFAULT_SKILLS));
  const [managerData, setManagerData] = useState(() => seedData(DEFAULT_EMPLOYEES, DEFAULT_SKILLS));
  const [showStats, setShowStats] = useState(false);
  const [showGap,   setShowGap]   = useState(false);

  // Shared employee / skill mutations
  const updateSkill    = (i, v) => setSkills(s => s.map((x, j) => j === i ? v : x));
  const updateEmployee = (i, f, v) => setEmployees(e => e.map((x, j) => j === i ? { ...x, [f]: v } : x));

  const addRow = () => {
    const emp = { name: `Pracownik ${employees.length + 1}`, role: "Operator" };
    setEmployees(e => [...e, emp]);
    setSelfData(d    => [...d,    skills.map(() => 0)]);
    setManagerData(d => [...d,    skills.map(() => 0)]);
  };
  const removeRow = i => {
    if (employees.length <= 1) return;
    setEmployees(e => e.filter((_, j) => j !== i));
    setSelfData(d    => d.filter((_, j) => j !== i));
    setManagerData(d => d.filter((_, j) => j !== i));
  };
  const addCol = () => {
    setSkills(s => [...s, `Kompetencja\n${s.length + 1}`]);
    setSelfData(d    => d.map(r => [...r, 0]));
    setManagerData(d => d.map(r => [...r, 0]));
  };
  const removeCol = i => {
    if (skills.length <= 1) return;
    setSkills(s => s.filter((_, j) => j !== i));
    setSelfData(d    => d.map(r => r.filter((_, j) => j !== i)));
    setManagerData(d => d.map(r => r.filter((_, j) => j !== i)));
  };

  const setSelfRating    = (ri, ci, v) => setSelfData(d    => d.map((r, i) => i === ri ? r.map((c, j) => j === ci ? v : c) : r));
  const setManagerRating = (ri, ci, v) => setManagerData(d => d.map((r, i) => i === ri ? r.map((c, j) => j === ci ? v : c) : r));

  return (
    <div style={{ minHeight: "100vh", background: "#f1f5f9", fontFamily: "'Segoe UI', -apple-system, sans-serif" }}>

      {/* TOP NAV */}
      <div style={{ background: "#1e293b", padding: "0 20px", height: 52, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 2px 8px rgba(0,0,0,0.3)", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ maxWidth: 1600, width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ color: "#fff", fontWeight: 800, fontSize: 18, letterSpacing: "0.06em", textTransform: "uppercase" }}>Matryca Kompetencji</span>
            <DeptBadge />
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <button onClick={() => setShowGap(!showGap)} style={{
              background: showGap ? "#7c3aed" : "transparent",
              border: `1px solid ${showGap ? "#7c3aed" : "#475569"}`,
              borderRadius: 8, color: showGap ? "#fff" : "#94a3b8",
              padding: "6px 14px", cursor: "pointer", fontSize: 12, fontWeight: 600,
              display: "flex", alignItems: "center", gap: 6,
            }}>🔍 {showGap ? "Ukryj" : "Analiza różnic"}</button>
            <button onClick={() => setShowStats(!showStats)} style={{
              background: showStats ? "#0ea5e9" : "transparent",
              border: `1px solid ${showStats ? "#0ea5e9" : "#475569"}`,
              borderRadius: 8, color: showStats ? "#fff" : "#94a3b8",
              padding: "6px 14px", cursor: "pointer", fontSize: 12, fontWeight: 600,
              display: "flex", alignItems: "center", gap: 6,
            }}>📊 {showStats ? "Ukryj" : "Statystyki"}</button>
            <div style={{ background: "#334155", borderRadius: 8, padding: "6px 12px", color: "#94a3b8", fontSize: 11, fontWeight: 600 }}>
              {employees.length} prac. · {skills.length} komp.
            </div>
          </div>
        </div>
      </div>

      <div style={{ padding: "20px", display: "flex", justifyContent: "center" }}>
      <div style={{ maxWidth: 1600, width: "100%" }}>

        {/* Stats */}
        {showStats && (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 10, marginBottom: 16 }}>
            {[0,1,2,3,4].map(v => {
              const cnt = selfData.flat().filter(x => x === v).length;
              const pct = selfData.flat().length ? Math.round(cnt / selfData.flat().length * 100) : 0;
              const cfg = RATING_CONFIG[v];
              return (
                <div key={v} style={{ background: "#fff", borderRadius: 10, border: "1px solid #e2e8f0", padding: "12px 14px", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                    <div style={{ width: 28, height: 28, borderRadius: 6, flexShrink: 0, background: cfg.bg, color: cfg.text, border: `2px solid ${cfg.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 800 }}>{v}</div>
                    <span style={{ fontSize: 10, color: "#64748b", lineHeight: 1.3 }}>{cfg.label}</span>
                  </div>
                  <div style={{ fontSize: 24, fontWeight: 800, color: cfg.text }}>{cnt}<span style={{ fontSize: 12, fontWeight: 400, color: "#94a3b8", marginLeft: 4 }}>({pct}%)</span></div>
                  <div style={{ height: 3, background: "#f1f5f9", borderRadius: 2, marginTop: 8 }}>
                    <div style={{ height: "100%", width: `${pct}%`, background: DOT_COLORS[v], borderRadius: 2, transition: "width 0.4s" }} />
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── SAMOOCENA ── */}
        <MatrixTable
          accentColor="#0ea5e9"
          headerBg="linear-gradient(90deg, #0369a1, #0284c7)"
          label="SAMOOCENA PRACOWNIKA"
          sublabel="Pracownik samodzielnie ocenia swój poziom każdej kompetencji"
          icon="🙋"
          employees={employees} skills={skills} data={selfData}
          onRatingChange={setSelfRating}
          onSkillChange={updateSkill}
          onEmployeeChange={updateEmployee}
          onAddRow={addRow} onRemoveRow={removeRow}
          onAddCol={addCol} onRemoveCol={removeCol}
          showStats={showStats}
          readonly={false}
        />

        {/* Divider */}
        <div style={{ display: "flex", alignItems: "center", gap: 16, margin: "20px 0" }}>
          <div style={{ flex: 1, height: 1, background: "linear-gradient(90deg, transparent, #cbd5e1)" }} />
          <div style={{
            background: "#fff", border: "1px solid #e2e8f0", borderRadius: 20,
            padding: "6px 18px", fontSize: 12, fontWeight: 700, color: "#64748b",
            boxShadow: "0 1px 4px rgba(0,0,0,0.06)",
          }}>vs.</div>
          <div style={{ flex: 1, height: 1, background: "linear-gradient(90deg, #cbd5e1, transparent)" }} />
        </div>

        {/* ── OCENA PRZEŁOŻONEGO ── */}
        <MatrixTable
          accentColor="#16a34a"
          headerBg="linear-gradient(90deg, #14532d, #15803d)"
          label="OCENA PRZEŁOŻONEGO"
          sublabel="Kierownik wprowadza własną ocenę kompetencji pracownika"
          icon="👔"
          employees={employees} skills={skills} data={managerData}
          compareData={selfData}
          onRatingChange={setManagerRating}
          onSkillChange={updateSkill}
          onEmployeeChange={updateEmployee}
          onAddRow={addRow} onRemoveRow={removeRow}
          onAddCol={addCol} onRemoveCol={removeCol}
          showStats={showStats}
          readonly={false}
        />

        {/* Gap analysis */}
        {showGap && (
          <>
            <div style={{ display: "flex", alignItems: "center", gap: 16, margin: "20px 0" }}>
              <div style={{ flex: 1, height: 1, background: "linear-gradient(90deg, transparent, #c4b5fd)" }} />
              <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 20, padding: "6px 18px", fontSize: 12, fontWeight: 700, color: "#7c3aed", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>Analiza różnic</div>
              <div style={{ flex: 1, height: 1, background: "linear-gradient(90deg, #c4b5fd, transparent)" }} />
            </div>
            <GapAnalysis employees={employees} skills={skills} selfData={selfData} managerData={managerData} />
          </>
        )}

        {/* Legend dots */}
        <div style={{ marginTop: 14, display: "flex", alignItems: "center", gap: 20, justifyContent: "center", flexWrap: "wrap" }}>
          {Object.entries(RATING_CONFIG).map(([k, v]) => (
            <div key={k} style={{ display: "flex", alignItems: "center", gap: 5 }}>
              <div style={{ width: 10, height: 10, borderRadius: "50%", background: DOT_COLORS[k] }} />
              <span style={{ fontSize: 11, color: "#64748b" }}>
                <strong style={{ color: "#334155" }}>{k}</strong> {v.label}
              </span>
            </div>
          ))}
        </div>

        {/* AI placeholder */}
        <div style={{ marginTop: 24 }}>
          <AIRecommendationsPlaceholder />
        </div>

      </div>{/* end max-width */}
      </div>{/* end padding */}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
