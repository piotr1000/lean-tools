                    <span style={{whiteSpace:'pre-line',lineHeight:1.3}}>
                      {colLabels.bledy_klient}
                      <span style={{opacity:0.5,fontSize:'0.5625rem',display:'block'}}>✎ 📊live</span>
                    </span>
                  )}
                </th>
                {/* Extra editable columns */}
                {extraCols.map(c=>(
                  <th key={c.id} style={{...thStyle,minWidth:'5.625rem',position:'relative'}}>
                    {editingCol===c.id?(
                      <input value={c.label}
                        onChange={e=>setExtraCols(prev=>prev.map(x=>x.id===c.id?{...x,label:e.target.value}:x))}
                        onBlur={()=>setEditingCol(null)}
                        onKeyDown={e=>e.key==='Enter'&&setEditingCol(null)}
                        autoFocus
                        style={{...inputStyle,color:'#0f172a',background:'white',borderRadius:'0.25rem',padding:'0.1875rem 0.3125rem'}}/>
                    ):(
                      <span style={{cursor:'pointer',display:'block',whiteSpace:'pre-line',lineHeight:1.3}}
                        onClick={()=>setEditingCol(c.id)}
                        title="Kliknij aby edytować nazwę">
                        {c.label}
                        <span style={{opacity:0.5,fontSize:'0.5625rem',display:'block'}}>✎</span>
                      </span>
                    )}
                    <button onClick={()=>removeColumn(c.id)}
                      title="Usuń kolumnę"
                      style={{position:'absolute',top:2,right:2,background:'rgba(255,255,255,0.15)',
                        border:'none',borderRadius:'50%',width:14,height:14,cursor:'pointer',
                        color:'white',fontSize:'0.5625rem',lineHeight:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
                      ×
                    </button>
                  </th>
                ))}
                <th style={{...thStyle,minWidth:'5.0rem'}}>
                  <button onClick={()=>setNewColLabel('Nowa kolumna')}
                    style={{background:'rgba(255,255,255,0.12)',border:'1px dashed rgba(255,255,255,0.4)',
                      borderRadius:'0.5rem',padding:'0.25rem 0.5rem',color:'rgba(255,255,255,0.7)',
                      cursor:'pointer',fontSize:'0.6875rem',fontFamily:'inherit'}}>
                    ＋ kolumna
                  </button>
                </th>
              </tr>
            </thead>
            <tbody>
              {allRows.map((row, ri) => {
                const kpi = getKpi(row);
                const pop = calcPoprawnosc(row);
                const isEven = ri % 2 === 0;
                const rowBg = isEven ? '#f8fafc' : 'white';
                // Is this the current month with live data?
                const liveKpi = calcKpiFromEntries(summLine, row.year, row.month);
                const hasLive = !!liveKpi;

                return (
                  <tr key={row.key} style={{background:rowBg}}>
                    <td style={{...tdStyle,fontWeight:700,color:'#1e293b',textAlign:'left'}}>
                      {row.year}
                    </td>
                    <td style={{...tdStyle,fontWeight:600,color:'#1e293b',textAlign:'left'}}>
                      {MONTHS_PL[row.month]}
                      {hasLive&&<span style={{marginLeft:'0.375rem',fontSize:'0.625rem',background:'#dbeafe',
                        color:'#1e40af',padding:'0.0625rem 0.3125rem',borderRadius:'0.5rem',fontWeight:700}}>live</span>}
                    </td>
                    {/* S Q D P */}
                    {['S','Q','D','P'].map(k=>{
                      const v = kpi?.[k];
                      return (
                        <td key={k} style={{...tdStyle,
                          background:hasLive?'#eff6ff':rowBg,
                          fontWeight:700,color:pctColor(v)}}>
                          {fPct(v)}
                        </td>
                      );
                    })}
                    {/* RAZEM */}
                    <td style={{...tdStyle,fontWeight:800,
                      background:hasLive?'#eff6ff':rowBg,
                      color:pctColor(kpi?.razem)}}>
                      {fPct(kpi?.razem)}
                    </td>
                    {/* Wydania pozycji — editable */}
                    <td style={{...tdStyle}}>
                      <input
                        value={getCell(row.key,'wyd_poz') || fNum(row.wyd_poz)}
                        onChange={e=>updateCell(row.key,'wyd_poz',e.target.value)}
                        style={inputStyle} placeholder="—"/>
                    </td>
                    {/* Wydania dok — editable */}
                    <td style={{...tdStyle}}>
                      <input
                        value={getCell(row.key,'wyd_dok') || fNum(row.wyd_dok)}
                        onChange={e=>updateCell(row.key,'wyd_dok',e.target.value)}
                        style={inputStyle} placeholder="—"/>
                    </td>
                    {/* Pomyłki — editable */}
                    <td style={{...tdStyle}}>
                      <input
                        value={getCell(row.key,'pomylki') || fNum(row.pomylki)}
                        onChange={e=>updateCell(row.key,'pomylki',e.target.value)}
                        style={{...inputStyle,
                          color: (getCell(row.key,'pomylki')||row.pomylki)>0?'#dc2626':'inherit',
                          fontWeight: (getCell(row.key,'pomylki')||row.pomylki)>0?700:400}}
                        placeholder="0"/>
                    </td>
                    {/* Poprawność wydań — calculated: (pozycje − pomyłki) / pozycje × 100% */}
                    <td style={{...tdStyle,fontWeight:700,background:'#f0fdf4',color:pctColor(pop)}}>
                      {(() => {
                        const editedPoz = getCell(row.key,'wyd_poz');
                        const editedPom = getCell(row.key,'pomylki');
                        const pozVal = editedPoz !== '' ? editedPoz : row.wyd_poz;
                        const pomVal = editedPom !== '' ? editedPom : (row.pomylki ?? 0);
                        const poz = parseFloat(pozVal);
                        const pom = parseFloat(pomVal ?? 0);
                        if (!poz || isNaN(poz)) return fPct(pop);
                        const calc = (poz - (isNaN(pom)?0:pom)) / poz;
                        return fPct(calc);
                      })()}
                    </td>
                    {/* Wysyłki PL/EX — editable */}
                    <td style={{...tdStyle}}>
                      <input value={getCell(row.key,'wysylki')}
                        onChange={e=>updateCell(row.key,'wysylki',e.target.value)}
                        style={inputStyle} placeholder="—"/>
                    </td>
                    {/* Nieterminowe wysyłki — editable */}
                    <td style={{...tdStyle}}>
                      <input value={getCell(row.key,'nieterminowe')}
                        onChange={e=>updateCell(row.key,'nieterminowe',e.target.value)}
                        style={{...inputStyle,
                          color:parseFloat(getCell(row.key,'nieterminowe'))>0?'#dc2626':'inherit',
                          fontWeight:parseFloat(getCell(row.key,'nieterminowe'))>0?700:400}}
                        placeholder="0"/>
                    </td>
                    {/* Poprawność wysyłek — calculated: (wysyłki − nieterminowe) / wysyłki × 100% */}
                    <td style={{...tdStyle,fontWeight:700,background:'#f0fdf4',
                      color:pctColor(calcPoprawnosc2(row))}}>
                      {fPct(calcPoprawnosc2(row))}
                    </td>
                    {/* Błędy na Produkcję — live z tablicy */}
                    {(()=>{
                      const b=getBledyForMonth(summLine,row.year,row.month);
                      return(
                        <>
                          <td style={{...tdStyle,fontWeight:700,background:'#fffbeb',
                            color:b.bledy_prod>0?'#d97706':'#059669'}}>
                            {b.bledy_prod}
                          </td>
                          <td style={{...tdStyle,fontWeight:700,background:'#fff1f2',
                            color:b.bledy_klient>0?'#dc2626':'#059669'}}>
                            {b.bledy_klient}
                          </td>
                        </>
                      );
                    })()}
                    {/* Extra columns */}
                    {extraCols.map(c=>(
                      <td key={c.id} style={{...tdStyle}}>
                        <input
                          value={getHistCell(row, c.id)}
                          onChange={e=>updateCell(row.key,c.id,e.target.value)}
                          style={inputStyle} placeholder="—"/>
                      </td>
                    ))}
                    <td style={{...tdStyle}}/>
                  </tr>
                );
              })}
              {/* ── WIERSZ SUMARYCZNY — wynik roczny ── */}
              {(()=>{
                const now = new Date();
                const isYearEnd = now.getMonth()===11 && now.getDate()===31;
                const TARGET_Q = 99.8, TARGET_D = 99.9;

                // Zlicz sumę pozycji i pomyłek ze wszystkich miesięcy
                let totalPoz=0,totalPom=0,countPoz=0;
                let totalWys=0,totalNit=0,countWys=0;
                allRows.forEach(row=>{
                  const poz=parseFloat(getCell(row.key,'wyd_poz')||row.wyd_poz||0);
                  const pom=parseFloat(getCell(row.key,'pomylki')||row.pomylki||0);
                  if(poz>0){totalPoz+=poz;totalPom+=pom;countPoz++;}
                  const wys=parseFloat(getCell(row.key,'wysylki')||0);
                  const nit=parseFloat(getCell(row.key,'nieterminowe')||0);
                  if(wys>0){totalWys+=wys;totalNit+=nit;countWys++;}
                });
                const resultQ = countPoz>0?(totalPoz-totalPom)/totalPoz*100:null;
                const resultD = countWys>0?(totalWys-totalNit)/totalWys*100:null;

                function getColor(result,target){
                  if(result===null) return '#94a3b8';
                  if(isYearEnd) return result>=target?'#059669':'#dc2626';
                  return '#d97706';
                }

                // Count total columns: 2(rok,mies) + 4(SQDP) + 1(razem) + 3(wyd_poz,wyd_dok,pomylki)
                // + 1(poprawnosc_wyd) + 2(wysylki,nieterminowe) + 1(poprawnosc_wys)
                // + 2(bledy_prod,bledy_klient) + extraCols.length + 1(add col)
                const fixedSpan = 2+4+1+3; // rok,mies,S,Q,D,P,razem,wyd_poz,wyd_dok,pomylki
                return(
                  <tr style={{background:'#0f172a'}}>
                    <td colSpan={fixedSpan}
                      style={{...tdStyle,background:'#0f172a',color:'white',
                        fontWeight:800,fontSize:'0.75rem',textAlign:'right',
                        padding:'0.625rem 0.875rem',letterSpacing:0.5}}>
                      📊 WYNIK ROCZNY {now.getFullYear()}
                    </td>
                    {/* Poprawność wydań — roczna */}
                    <td style={{...tdStyle,background:'#052e16',fontWeight:900,
                      color:getColor(resultQ,TARGET_Q),fontSize:'0.875rem'}}>
                      {resultQ!==null?`${resultQ.toFixed(2)}%`:'–'}
                      <div style={{fontSize:'0.5625rem',color:'rgba(255,255,255,0.45)',fontWeight:400,marginTop:1}}>
                        Cel: {TARGET_Q}%
                      </div>
                    </td>
                    {/* Wysyłki, Nieterminowe — suma */}
                    <td style={{...tdStyle,background:'#0f172a',color:'rgba(255,255,255,0.5)',fontSize:'0.75rem'}}>
                      {totalWys>0?totalWys:'–'}
                    </td>
                    <td style={{...tdStyle,background:'#0f172a',color:totalNit>0?'#fca5a5':'rgba(255,255,255,0.5)',
                      fontWeight:totalNit>0?700:400,fontSize:'0.75rem'}}>
                      {totalWys>0?totalNit:'–'}
                    </td>
                    {/* Poprawność wysyłek — roczna */}
                    <td style={{...tdStyle,background:'#052e16',fontWeight:900,
                      color:getColor(resultD,TARGET_D),fontSize:'0.875rem'}}>
                      {resultD!==null?`${resultD.toFixed(2)}%`:'–'}
                      <div style={{fontSize:'0.5625rem',color:'rgba(255,255,255,0.45)',fontWeight:400,marginTop:1}}>
                        Cel: {TARGET_D}%
                      </div>
                    </td>
                    {/* Błędy — puste w summary row */}
                    <td style={{...tdStyle,background:'#0f172a'}}/>
                    <td style={{...tdStyle,background:'#0f172a'}}/>
                    {/* Extra cols */}
                    {extraCols.map(c=>(
                      <td key={c.id} style={{...tdStyle,background:'#0f172a'}}/>
                    ))}
                    <td style={{...tdStyle,background:'#0f172a'}}/>
                  </tr>
                );
              })()}
            </tbody>
          </table>
        </div>

        {/* Add column form */}
        {newColLabel !== '' && (
          <div style={{display:'flex',gap:'0.5rem',marginTop:'0.75rem',alignItems:'center'}}>
            <span style={{fontSize:'0.8125rem',color:'#64748b',fontWeight:600}}>Nazwa nowej kolumny:</span>
            <input value={newColLabel} onChange={e=>setNewColLabel(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&addColumn()}
              style={{border:'1.5px solid #e2e8f0',borderRadius:'0.5rem',padding:'0.4375rem 0.75rem',
                fontSize:'0.8125rem',fontFamily:'inherit',outline:'none',width:220}}
              autoFocus/>
            <button onClick={addColumn}
              style={{background:'#0f172a',color:'white',border:'none',borderRadius:'0.5rem',
                padding:'0.4375rem 1.0rem',fontWeight:700,fontSize:'0.8125rem',cursor:'pointer',fontFamily:'inherit'}}>
              Dodaj
            </button>
            <button onClick={()=>setNewColLabel('')}
              style={{background:'white',color:'#64748b',border:'1.5px solid #e2e8f0',borderRadius:'0.5rem',
                padding:'0.4375rem 0.75rem',fontWeight:600,fontSize:'0.8125rem',cursor:'pointer',fontFamily:'inherit'}}>
              Anuluj
            </button>
          </div>
        )}

        {/* ── FORMULA EXPLANATION ── */}
        <div style={{marginTop:'1.5rem',background:'white',borderRadius:'1.0rem',
          boxShadow:'0 2px 12px rgba(0,0,0,0.06)',border:'1px solid #e2e8f0',padding:24}}>
          <h3 style={{margin:'0 0 1.0rem',fontSize:'1.0rem',fontWeight:800,color:'#0f172a'}}>
            📐 Wzory i objaśnienia
          </h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'1.0rem'}}>
            {/* Poprawność wydań */}
            <div style={{background:'#f0fdf4',borderRadius:'0.75rem',padding:16,border:'1px solid #bbf7d0'}}>
              <div style={{fontWeight:800,fontSize:'0.875rem',color:'#065f46',marginBottom:'0.5rem'}}>
                ✅ Poprawność wydań (Quality)
              </div>
              <div style={{fontFamily:'monospace',fontSize:'0.8125rem',background:'white',
                borderRadius:'0.5rem',padding:'0.625rem 0.875rem',border:'1px solid #d1fae5',
                color:'#065f46',fontWeight:600,marginBottom:'0.5rem'}}>
                = (Pozycje − Pomyłki) ÷ Pozycje × 100%
              </div>
              <div style={{fontSize:'0.75rem',color:'#374151',lineHeight:1.6}}>
                <strong>Przykład:</strong> 505 pozycji, 2 pomyłki<br/>
                = (505 − 2) ÷ 505 × 100% = <strong>99,60%</strong><br/>
                <br/>
                Podstawą jest liczba <strong>pozycji (linii)</strong> na dokumentach RW/MMW,
                ponieważ każda pozycja stanowi osobną okazję do popełnienia błędu.
              </div>
            </div>
            {/* RAZEM */}
            <div style={{background:'#eff6ff',borderRadius:'0.75rem',padding:16,border:'1px solid #bfdbfe'}}>
              <div style={{fontWeight:800,fontSize:'0.875rem',color:'#1e3a8a',marginBottom:'0.5rem'}}>
                📊 Wskaźnik RAZEM (średnia S+Q+D+P)
              </div>
              <div style={{fontFamily:'monospace',fontSize:'0.8125rem',background:'white',
                borderRadius:'0.5rem',padding:'0.625rem 0.875rem',border:'1px solid #dbeafe',
                color:'#1e3a8a',fontWeight:600,marginBottom:'0.5rem'}}>
                = (S + Q + D + P) ÷ 4
              </div>
              <div style={{fontSize:'0.75rem',color:'#374151',lineHeight:1.6}}>
                Prosta średnia arytmetyczna czterech wskaźników.<br/>
                <strong>Kolor wskaźnika:</strong><br/>
                <span style={{color:'#059669',fontWeight:700}}>● Zielony</span> ≥ 99,0% &nbsp;
                <span style={{color:'#d97706',fontWeight:700}}>● Żółty</span> ≥ 95,0% &nbsp;
                <span style={{color:'#dc2626',fontWeight:700}}>● Czerwony</span> &lt; 95,0%
              </div>
            </div>
            {/* Cele roczne + wyniki dynamiczne */}
            {(()=>{
              const TARGET_QUALITY  = 99.8;
              const TARGET_DELIVERY = 99.9;
              const now = new Date();
              const isYearEnd = now.getMonth()===11 && now.getDate()===31;

              // Wylicz średnią Poprawność wydań ze wszystkich miesięcy z extraData
              function calcYearlyAvg(field_poz, field_pom, field_wys, field_nit, mode){
                // mode: 'wydania' | 'wysylki'
                let totalPoz=0, totalPom=0, totalWys=0, totalNit=0, countWyd=0, countWys=0;
                allRows.forEach(row=>{
                  if(mode==='wydania'){
                    const poz=parseFloat(getCell(row.key,field_poz)||row.wyd_poz||0);
                    const pom=parseFloat(getCell(row.key,field_pom)||row.pomylki||0);
                    if(poz>0){totalPoz+=poz;totalPom+=pom;countWyd++;}
                  } else {
                    const wys=parseFloat(getCell(row.key,field_wys)||0);
                    const nit=parseFloat(getCell(row.key,field_nit)||0);
                    if(wys>0){totalWys+=wys;totalNit+=nit;countWys++;}
                  }
                });
                if(mode==='wydania') return countWyd>0?(totalPoz-totalPom)/totalPoz*100:null;
                return countWys>0?(totalWys-totalNit)/totalWys*100:null;
              }

              const resultQ = calcYearlyAvg('wyd_poz','pomylki',null,null,'wydania');
              const resultD = calcYearlyAvg(null,null,'wysylki','nieterminowe','wysylki');

              function resultColor(result, target){
                if(result===null) return '#94a3b8';
                if(isYearEnd) return result>=target?'#059669':'#dc2626';
                return '#d97706'; // w trakcie roku — pomarańczowy
              }
              function resultLabel(result, target){
                if(result===null) return '–';
                if(isYearEnd) return result>=target?'✅ Cel osiągnięty':'❌ Cel nieosiągnięty';
                return '⏳ W trakcie roku';
              }

              return(
                <div style={{background:'#fffbeb',borderRadius:'0.75rem',padding:16,
                  border:'1px solid #fde68a',display:'flex',flexDirection:'column',gap:'0.75rem'}}>
                  <div style={{fontWeight:800,fontSize:'0.875rem',color:'#92400e'}}>
                    🎯 Cele roczne {now.getFullYear()}
                  </div>
                  {/* Quality */}
                  <div style={{background:'white',borderRadius:'0.625rem',padding:'0.75rem 1.0rem',
                    border:'1px solid #d1fae5'}}>
                    <div style={{fontSize:'0.6875rem',color:'#64748b',fontWeight:600,
                      textTransform:'uppercase',letterSpacing:0.5,marginBottom:'0.25rem'}}>
                      Poprawność wydań (Quality)
                    </div>
                    <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',gap:'0.5rem'}}>
                      <span style={{fontSize:'0.75rem',color:'#64748b'}}>Cel: <strong>{TARGET_QUALITY}%</strong></span>
                      <span style={{fontSize:'1.125rem',fontWeight:900,
                        color:resultColor(resultQ,TARGET_QUALITY)}}>
                        {resultQ!==null?`${resultQ.toFixed(2)}%`:'–'}
                      </span>
                    </div>
                    <div style={{fontSize:'0.6875rem',fontWeight:700,marginTop:'0.25rem',
                      color:resultColor(resultQ,TARGET_QUALITY)}}>
                      {resultLabel(resultQ,TARGET_QUALITY)}
                    </div>
                    <div style={{marginTop:'0.375rem',height:4,background:'#f1f5f9',borderRadius:2,overflow:'hidden'}}>
                      {resultQ!==null&&<div style={{height:'100%',borderRadius:2,
                        background:resultColor(resultQ,TARGET_QUALITY),
                        width:`${Math.min(resultQ/TARGET_QUALITY*100,100)}%`}}/>}
                    </div>
                  </div>
                  {/* Delivery */}
                  <div style={{background:'white',borderRadius:'0.625rem',padding:'0.75rem 1.0rem',
                    border:'1px solid #dbeafe'}}>
                    <div style={{fontSize:'0.6875rem',color:'#64748b',fontWeight:600,
                      textTransform:'uppercase',letterSpacing:0.5,marginBottom:'0.25rem'}}>
                      Poprawność wysyłek (Delivery)
                    </div>
                    <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',gap:'0.5rem'}}>
                      <span style={{fontSize:'0.75rem',color:'#64748b'}}>Cel: <strong>{TARGET_DELIVERY}%</strong></span>
                      <span style={{fontSize:'1.125rem',fontWeight:900,
                        color:resultColor(resultD,TARGET_DELIVERY)}}>
                        {resultD!==null?`${resultD.toFixed(2)}%`:'–'}
                      </span>
                    </div>
                    <div style={{fontSize:'0.6875rem',fontWeight:700,marginTop:'0.25rem',
                      color:resultColor(resultD,TARGET_DELIVERY)}}>
                      {resultLabel(resultD,TARGET_DELIVERY)}
                    </div>
                    <div style={{marginTop:'0.375rem',height:4,background:'#f1f5f9',borderRadius:2,overflow:'hidden'}}>
                      {resultD!==null&&<div style={{height:'100%',borderRadius:2,
                        background:resultColor(resultD,TARGET_DELIVERY),
                        width:`${Math.min(resultD/TARGET_DELIVERY*100,100)}%`}}/>}
                    </div>
                  </div>
                  <div style={{fontSize:'0.625rem',color:'#92400e',lineHeight:1.5}}>
                    ⏳ Pomarańczowy = w trakcie roku<br/>
                    ✅ Zielony = cel osiągnięty (31 XII)<br/>
                    ❌ Czerwony = cel nieosiągnięty (31 XII)<br/>
                    Wynik liczony jako średnia ważona wszystkich miesięcy.
                  </div>
                </div>
              );
            })()}
          </div>
          {/* Column legend */}
          <div style={{marginTop:'1.0rem',padding:'0.75rem 1.0rem',background:'#f8fafc',
            borderRadius:'0.625rem',border:'1px solid #e2e8f0'}}>
            <div style={{fontWeight:700,fontSize:'0.75rem',color:'#64748b',
              textTransform:'uppercase',letterSpacing:1,marginBottom:'0.5rem'}}>Legenda kolumn</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'0.625rem',fontSize:'0.75rem',color:'#374151'}}>
              {[
                {bg:'#eff6ff',text:'Niebieskie tło = dane pobierane automatycznie z tablicy SQDP (live)'},
                {bg:'#f0fdf4',text:'Zielone tło = wartość wyliczona automatycznie ze wzoru'},
                {bg:'white',text:'Białe/szare = dane wpisywane ręcznie z systemu WMS/ERP'},
                {bg:'#fef3c7',text:'Badge "live" = miesiąc ma aktualne dane z tablicy'},
              ].map(({bg,text},i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:'0.4375rem'}}>
                  <span style={{width:14,height:14,background:bg,borderRadius:3,
                    border:'1px solid #e2e8f0',display:'inline-block',flexShrink:0}}/>
                  <span>{text}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  // Auto-save entries and issues to localStorage
const [entries,setEntries]=useState({});

const [issues, setIssues] = useState([]);

  // Persist entries and issues whenever they change
const setEntriesPersist = useCallback((updater)=>{
    setEntries(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      return next;
    });
  },[]);

 const [lines, setLines] = useState([]);

const setIssuesPersist = useCallback((updater)=>{
    setIssues(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      // Sync do Supabase — znajdź nowe/zmienione issue
      const ORG='00000000-0000-0000-0000-000000000001';
      const prevIds=new Set(prev.map(i=>i.id));
      next.forEach(issue=>{
        if(!prevIds.has(issue.id)){
          // Nowe issue — insert
          const lineObj=lines.find(l=>l.name===issue.line||l.id===issue.line_id);
      const tempId = issue.id;
        db.from('sqdp_issues').insert({
            organization_id: ORG,
            line_id: lineObj?.id || issue.line_id,
            area: issue.area,
            title: issue.title,
            status: issue.status||'open',
            date: issue.date || new Date().toISOString().split('T')[0],
            location: issue.location || '',
          }).select().then(({data, error})=>{
            if(error){ console.error('Błąd dodawania issue:', error.message); return; }
            if(data && data[0]){
              // Zamień tymczasowe ID na prawdziwe UUID z Supabase
              setIssues(prev => prev.map(i => i.id === tempId ? {...i, id: data[0].id} : i));
            }
          });
        } else {
          // Istniejące — update statusu
          const old=prev.find(i=>i.id===issue.id);
          if(old && old.status!==issue.status){
            db.from('sqdp_issues').update({status: issue.status, updated_at: new Date().toISOString()})
              .eq('id', issue.id)
              .then(({error})=>{ if(error) console.error('Błąd aktualizacji issue:', error.message); });
          }
        }
      });
      // Usunięte issue
      const nextIds=new Set(next.map(i=>i.id));
      prev.forEach(issue=>{
        if(!nextIds.has(issue.id)){
          db.from('sqdp_issues').delete().eq('id', issue.id)
            .then(({error})=>{ if(error) console.error('Błąd usuwania issue:', error.message); });
        }
      });
      return next;
    });
  },[lines]);

useEffect(()=>{
  db.from('sqdp_lines').select('id, name').order('name').then(({data, error})=>{
    if(error){ console.error('Błąd ładowania linii:', error.message); return; }
    if(data && data.length > 0){
      setLines(data);
      // Ładuj Issues po załadowaniu linii
      db.from('sqdp_issues').select('*').order('created_at', {ascending:false})
        .then(({data:iData, error:iError})=>{
          if(iError){ console.error('Błąd ładowania issues:', iError.message); return; }
          if(iData && iData.length > 0){
            // Mapuj line_id → line name
            const mapped = iData.map(issue=>{
              const lineObj = data.find(l=>l.id===issue.line_id);
              return {
                ...issue,
                line: lineObj?.name || '',
                date: issue.date || issue.created_at?.split('T')[0] || '',
                location: issue.location || '',
              };
            });
            setIssues(mapped);
          }
        });
    }
  });
},[]);

useEffect(()=>{
  if(lines.length === 0) return;
  const currentYear = new Date().getFullYear();
  db.from('sqdp_entries')
  .select('line_id, date, category, status, comment')
  .gte('date', `${currentYear}-01-01`)
  .lte('date', `${currentYear}-12-31`)
    .then(({data, error})=>{
      if(error){ console.error('Błąd ładowania wpisów:', error.message); return; }
      if(!data || data.length === 0) return;
      // Odczytaj listę wyczyszczonych miesięcy
      let cleared=[];
      try{ cleared=JSON.parse(localStorage.getItem('sqdp-cleared')||'[]'); }catch{}
      setEntries(prev=>{
        const next={...prev};
        data.forEach(row=>{
          const lineObj=lines.find(l=>l.id===row.line_id);
          if(!lineObj) return;
          // Pomiń dane dla miesięcy wyczyszczonych przez użytkownika
          const ck=`${lineObj.name}-${row.date.substring(0,7)}`;
          if(cleared.includes(ck)) return;
          const k=eKey(lineObj.name, row.date);
          if(!next[k]) next[k]={id:k,date:row.date,line:lineObj.name,
            S:null,Q:null,D:null,P:null,
            comments:{S:'',Q:'',D:'',P:''},
            locations:{S:'',Q:'',D:'',P:''}};
          next[k][row.category]=row.status;
          next[k].comments[row.category]=row.comment||'';
        });
        return next;
      });
    });
},[lines]);

// Ładuj dane Podsumowania z Supabase
useEffect(()=>{
  if(lines.length === 0) return;
  // Kolumny
  db.from('sqdp_summary_cols').select('*').order('sort_order').then(({data, error})=>{
    if(error){ console.error('Błąd ładowania summary cols:', error.message); return; }
    if(data && data.length > 0){
      const cols = data.map(c => ({id: c.id, label: c.label}));
      setExtraCols(cols);
      try{ localStorage.setItem('sqdp-extra-cols', JSON.stringify(cols)); }catch{}
    }
  });
  // Dane komórek
  db.from('sqdp_summary').select('*').then(({data, error})=>{
    if(error){ console.error('Błąd ładowania summary data:', error.message); return; }
    if(data && data.length > 0){
      const fromDB = {};
      data.forEach(row=>{
        const lineObj = lines.find(l => l.id === row.line_id);
        if(!lineObj) return;
        fromDB[`${lineObj.name}-${row.year_month}-${row.field}`] = row.value ?? '';
      });
      setExtraData(fromDB);
      try{ localStorage.setItem('sqdp-extra-data', JSON.stringify(fromDB)); }catch{}
    }
  });
},[lines]);

  const [view,   setView]   =useState('board');
  const [goals,  setGoals]  =useState({});
  const [locations, setLocations] = useState(DEFAULT_LOCATIONS);

  // Summary table data — persisted in localStorage so navigating away doesn't lose data
  const [extraCols, setExtraCols] = useState(()=>{
    try{ const s=localStorage.getItem('sqdp-extra-cols');
      return s?JSON.parse(s):[
        {id:'c1',label:'Przyjęcia ilość pozycji'},
        {id:'c2',label:'Przyjęcia ilość dokumentów'},
        {id:'c3',label:'Uwagi'},
      ];
    }catch{return [{id:'c1',label:'Przyjęcia ilość pozycji'},{id:'c2',label:'Przyjęcia ilość dokumentów'},{id:'c3',label:'Uwagi'}];}
  });
  const [extraData, setExtraData] = useState(()=>{
    try{ const s=localStorage.getItem('sqdp-extra-data'); return s?JSON.parse(s):{}; }catch{return {};}
  });

  
// Auto-save extraCols and extraData to localStorage + Supabase
  const ORG = '00000000-0000-0000-0000-000000000001';

  const setExtraColsPersist = (updater) => {
    setExtraCols(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      try { localStorage.setItem('sqdp-extra-cols', JSON.stringify(next)); } catch {}
      // Upsert wszystkich kolumn
      const nextIds = new Set(next.map(c => c.id));
      if (next.length > 0) {
        db.from('sqdp_summary_cols').upsert(
          next.map((c, i) => ({id: c.id, organization_id: ORG, label: c.label, sort_order: i, updated_at: new Date().toISOString()})),
          {onConflict: 'id'}
        ).then(({error}) => { if (error) console.error('Błąd sync cols:', error.message); });
      }
      // Usuń skasowane kolumny
      prev.forEach(c => {
        if (!nextIds.has(c.id))
          db.from('sqdp_summary_cols').delete().eq('id', c.id)
            .then(({error}) => { if (error) console.error('Błąd usuwania col:', error.message); });
      });
      return next;
    });
  };

  const setExtraDataPersist = (updater) => {
    setExtraData(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      try { localStorage.setItem('sqdp-extra-data', JSON.stringify(next)); } catch {}
      return next;
    });
  };

  // Zapis pojedynczej komórki Podsumowania do Supabase
  const saveSummaryCell = useCallback((lineName, rowKey, field, value) => {
    const lineObj = lines.find(l => l.name === lineName);
    if (!lineObj) return;
    if (value === '' || value === null || value === undefined) {
      db.from('sqdp_summary').delete()
        .eq('line_id', lineObj.id).eq('year_month', rowKey).eq('field', field)
        .then(({error}) => { if (error) console.error('Błąd usuwania summary cell:', error.message); });
    } else {
      db.from('sqdp_summary').upsert({
        organization_id: ORG,
        line_id: lineObj.id,
        year_month: rowKey,
        field,
        value: String(value),
        updated_at: new Date().toISOString(),
      }, {onConflict: 'line_id,year_month,field'})
        .then(({error}) => { if (error) console.error('Błąd zapisu summary cell:', error.message); });
    }
  }, [lines]);

// Dedykowane usuwanie issue — bezpośredni zapis do Supabase
  const deleteIssuePersist = useCallback((id) => {
    setIssues(prev => prev.filter(x => x.id !== id));
    db.from('sqdp_issues').delete().eq('id', id)
      .then(({error}) => {
        if (error) {
          console.error('❌ Błąd usuwania issue:', error.message, '| id:', id);
          db.from('sqdp_issues').select('*').order('created_at', {ascending:false})
            .then(({data}) => {
              if (!data) return;
              const mapped = data.map(issue => {
                const lineObj = lines.find(l => l.id === issue.line_id);
                return {...issue, line: lineObj?.name||'', date: issue.date||'', location: issue.location||''};
              });
              setIssues(mapped);
            });
        } else {
          console.log('✅ Issue usunięty:', id);
        }
      });
  }, [lines]);

const handleToggle=useCallback((line,dateStr,catKey,nextStatus,comment,loc)=>{
// Jeśli użytkownik wpisuje dane do wyczyszczonego miesiąca — usuń blokadę
if(nextStatus !== null){
  const ck=`${line}-${dateStr.substring(0,7)}`;
  try{
    const cl=JSON.parse(localStorage.getItem('sqdp-cleared')||'[]');
    if(cl.includes(ck))
      localStorage.setItem('sqdp-cleared',JSON.stringify(cl.filter(x=>x!==ck)));
  }catch{}
}

  setEntriesPersist(prev=>{
    const k=eKey(line,dateStr);
    const ex=prev[k]||{id:k,date:dateStr,line,
      S:null,Q:null,D:null,P:null,
      comments:{S:'',Q:'',D:'',P:''},
      locations:{S:'',Q:'',D:'',P:''}};
    if(nextStatus===null){
      return{...prev,[k]:{
        ...ex,
        [catKey]: null,
        comments:{...ex.comments,[catKey]:''},
        locations:{...ex.locations,[catKey]:''},
      }};
    }
    return{...prev,[k]:{...ex,
      [catKey]: nextStatus,
      comments:{...ex.comments,
        [catKey]:comment!==null?comment:
          nextStatus==='green'?'':ex.comments[catKey]},
      locations:{...ex.locations,
        [catKey]:loc!=null?loc:ex.locations[catKey]},
    }};
  });
  // Zapis do Supabase
  const lineObj=lines.find(l=>l.name===line);
  if(lineObj){
    const ORG='00000000-0000-0000-0000-000000000001';
    if(nextStatus===null){
      db.from('sqdp_entries').delete()
        .eq('line_id',lineObj.id).eq('date',dateStr).eq('category',catKey)
        .then(({error})=>{ if(error) console.error('Błąd usuwania:',error.message); });
    } else {
      db.from('sqdp_entries').upsert({
        organization_id:ORG,
        line_id:lineObj.id,
        date:dateStr,
        category:catKey,
        status:nextStatus,
        comment:comment||'',
        updated_at:new Date().toISOString(),
      },{onConflict:'line_id,date,category'})
        .then(({error})=>{ if(error) console.error('Błąd zapisu:',error.message); });
    }
  }
},[setEntriesPersist, lines]);

const handleReset=useCallback((line,year,month)=>{
  const ms=`${year}-${String(month+1).padStart(2,'0')}`;
  // 1. Wyczyść lokalny stan i localStorage
  setEntriesPersist(prev=>{
    const n={...prev};
    Object.keys(n).forEach(k=>{if(n[k].line===line&&n[k].date.startsWith(ms))delete n[k];});
    return n;
  });
  // 2. Zaznacz miesiąc jako wyczyszczony — to blokuje ponowne ładowanie z Supabase
  const ck=`${line}-${ms}`;
  try{
    const cl=JSON.parse(localStorage.getItem('sqdp-cleared')||'[]');
    if(!cl.includes(ck)) cl.push(ck);
    localStorage.setItem('sqdp-cleared',JSON.stringify(cl));
  }catch{}
  // 3. Usuń z Supabase (best-effort)
  const lineObj=lines.find(l=>l.name===line);
  if(lineObj){
    const lastDay=new Date(year,month+1,0).getDate();
    db.from('sqdp_entries').delete()
      .eq('line_id',lineObj.id)
      .gte('date',`${ms}-01`)
      .lte('date',`${ms}-${String(lastDay).padStart(2,'0')}`)
      .then(({error})=>{
        if(error) console.error('Błąd czyszczenia miesiąca w Supabase:',error.message);
        else console.log(`✅ Wyczyszczono ${line} ${ms} w Supabase`);
      });
  }
},[setEntriesPersist, lines]);

  const [uiScale, setUiScale] = useState(1.0); // 1.0 = normal, 1.25 = large, 1.5 = XL

  return(
    <div
      className="sqdp-root"
      style={{
        fontFamily:'-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif',
        height:'100vh',overflow:'hidden',display:'flex',flexDirection:'column',
        /* clamp = naturalne skalowanie; przełącznik nadpisuje przez inline style */
        fontSize: uiScale !== 1.0 ? `${uiScale * 14}px` : undefined,
      }}>
      {/* Scale selector bar */}
      <div style={{background:'#020617',padding:'3px 16px',display:'flex',
        alignItems:'center',justifyContent:'flex-end',gap:6,flexShrink:0,
        borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
        <span style={{color:'rgba(255,255,255,0.28)',fontSize:10,marginRight:4}}>
          🖥 Rozmiar:
        </span>
        {[
          {val:0.85, label:'S', desc:'Mały — laptopy 13-15"'},
          {val:1.0,  label:'M', desc:'Auto — clamp() skaluje naturalnie (domyślny)'},
          {val:1.2,  label:'L', desc:'Duży — monitory 32-40"'},
          {val:1.45, label:'XL',desc:'Bardzo duży — ekrany 50"+ / hale produkcyjne'},
        ].map(opt=>(
          <button key={opt.val} onClick={()=>setUiScale(opt.val)}
            title={opt.desc}
            style={{
              background: uiScale===opt.val ? 'rgba(99,102,241,0.35)' : 'rgba(255,255,255,0.04)',
              border: uiScale===opt.val ? '1px solid rgba(99,102,241,0.7)' : '1px solid rgba(255,255,255,0.1)',
              borderRadius: 5,
              color: uiScale===opt.val ? '#a5b4fc' : 'rgba(255,255,255,0.3)',
              fontSize: 10, fontWeight: uiScale===opt.val ? 800 : 400,
              padding: '2px 9px', cursor: 'pointer', fontFamily: 'inherit',
            }}>
            {opt.label}
          </button>
        ))}
        <span style={{color:'rgba(255,255,255,0.12)',fontSize:10,marginLeft:6}}>
          Ctrl+scroll = zoom
        </span>
      </div>
      {/* Global nav placeholder */}
      <div style={{height:0}}/>
      {view==='board'?(
        <MainBoard entries={entries} onToggle={handleToggle} onReset={handleReset}
          issues={issues} setIssues={setIssuesPersist} onDeleteIssue={deleteIssuePersist} lines={lines} setLines={setLines}
          goals={goals} setGoals={setGoals}
          locations={locations} setLocations={setLocations}
          uiScale={uiScale}
          onSummary={()=>setView('summary')}/>
      ):(
        <Summary entries={entries} lines={lines} onBoard={()=>setView('board')}
          extraCols={extraCols} setExtraCols={setExtraColsPersist}
          extraData={extraData} setExtraData={setExtraDataPersist}
          issues={issues} locations={locations}
          onSaveCell={saveSummaryCell}/>
      )}
      <style>{`
        *{box-sizing:border-box;} body{margin:0;}
        ::-webkit-scrollbar{width:5px;height:5px;}
        ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
        input:focus,textarea:focus,select:focus{outline:2px solid #3b82f6!important;border-color:#3b82f6!important;}

        /* ── Responsive font scaling ─────────────────────────────────────
           Zamiast twardych px, używamy clamp() + vw żeby interfejs
           naturalnie skalował się między monitorami bez przełącznika.
           
           clamp(min, preferred, max):
           - min  = najmniejsszy akceptowalny rozmiar (laptop)
           - vw   = relatywny do szerokości ekranu (rośnie z monitorem)
           - max  = sufit — na 50" nie przerośnie tej wartości
           
           Efekt: 21" ~14px, 27" ~15px, 32" ~16px, 50" max 18px
        ──────────────────────────────────────────────────────────────── */
        .sqdp-root {
          font-size: clamp(13px, 0.85vw, 17px);
        }

        /* Nadpisanie z przełącznika S/M/L/XL ma wyższy priorytet */
        .sqdp-root[data-scale] {
          font-size: var(--ui-scale-size) !important;
        }

        /* Board columns — na wąskich ekranach kolumny mogą być mniejsze */
        @media (max-width: 1400px) {
          .sqdp-column { max-width: 340px !important; }
          .sqdp-ring-wrap { max-width: 300px !important; }
        }
        @media (min-width: 2560px) {
          /* 4K / bardzo duże monitory — kolumny mogą być trochę szersze */
          .sqdp-column { max-width: 440px !important; }
          .sqdp-ring-wrap { max-width: 400px !important; }
        }
      `}</style>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
