// Wake Lock — ekran nie wygasa dopóki strona jest otwarta
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      const wakeLock = await navigator.wakeLock.request('screen');
      document.addEventListener('visibilitychange', async () => {
        if (document.visibilityState === 'visible') {
          await navigator.wakeLock.request('screen');
        }
      });
    }
  } catch(e) {}
}
requestWakeLock();

// ─── SEED DATA ────────────────────────────────────────────────────────────────
function makeSeedEntries() {
  const out = {};
  const skip = [1,2,8,9,15,16,22,23,29,30];
  ['Unisystem','Riverdi'].forEach(line => {
    const redQ = line==='Unisystem'?[7,14,21]:[10,20];
    const redD = line==='Unisystem'?[18]:[5,19];
    for (let d=1;d<=31;d++) {
      if (skip.includes(d)) continue;
      const ds=`2026-03-${String(d).padStart(2,'0')}`;
      const k=`${line}-${ds}`;
      out[k]={id:k,date:ds,line,
        S:'green',Q:redQ.includes(d)?'red':'green',D:redD.includes(d)?'red':'green',P:'green',
        comments:{S:'',Q:redQ.includes(d)?'Błąd jakościowy':'',D:redD.includes(d)?'Opóźnienie':'',P:''},
        locations:{S:'',Q:'',D:'',P:''}};
    }
  });
  return out;
}

// ─── COMMENT MODAL ─────────────────────────────────────────────────────────────
function CommentModal({info,entries,onSave,onClose,customLabels,onAddLabel,onRemoveLabel,locations,setLocations}){
  const {line,date,catKey}=info;
  const cat=CATS.find(c=>c.key===catKey);
  const k=eKey(line,date);
  const status=entries[k]?.[catKey];
  const [val,setVal]=useState(entries[k]?.comments?.[catKey]||'');
  const [loc,setLoc]=useState(entries[k]?.locations?.[catKey]||'');
  const [newLbl,setNewLbl]=useState('');
  const [showNew,setShowNew]=useState(false);
  const [confirmDel,setConfirmDel]=useState(null);

  // Location management state
  const [showLocManager,setShowLocManager]=useState(false);
  const [newLocLabel,setNewLocLabel]=useState('');
  const [newLocType,setNewLocType]=useState('other');   // 'other' | 'stat'
  const [newLocStatName,setNewLocStatName]=useState(''); // custom stat category name
  const [confirmDelLoc,setConfirmDelLoc]=useState(null);

  const locs = locations||DEFAULT_LOCATIONS;
  const allLabels=[...DEFAULT_LABELS[catKey],...(customLabels[catKey]||[])];

  function addNew(){
    if(!newLbl.trim()) return;
    onAddLabel(catKey,newLbl.trim()); setVal(newLbl.trim()); setNewLbl(''); setShowNew(false);
  }
  function addLocation(){
    if(!newLocLabel.trim()) return;
    // type = 'other' for table-only, or the stat category name entered by user
    const type = newLocType==='other' ? 'other'
      : (newLocStatName.trim().toLowerCase().replace(/\s+/g,'_') || 'stat');
    const newLoc={id:`loc_${Date.now()}`,label:newLocLabel.trim(),type,
      statLabel:newLocType==='other'?null:(newLocStatName.trim()||'Statystyki')};
    setLocations(prev=>[...prev,newLoc]);
    setNewLocLabel('');setNewLocType('other');setNewLocStatName('');
  }
  function removeLocation(id){
    setLocations(prev=>prev.filter(l=>l.id!==id));
    if(loc===id) setLoc('');
    setConfirmDelLoc(null);
  }

  // Get stat hint for selected location
  const selLocMeta = locs.find(l=>l.id===loc);
  const locHint = selLocMeta
    ? selLocMeta.type==='other'
      ? '📋 Widoczne w tabeli problemów, nie wliczane do statystyk'
      : `📊 Wejdzie do statystyk "${selLocMeta.statLabel||selLocMeta.type}"`
    : null;

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,0.6)',display:'flex',
      alignItems:'center',justifyContent:'center',zIndex:200,padding:20}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'white',borderRadius:'1.375rem',width:'100%',maxWidth:560,
        maxHeight:'92vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.25)'}}>
        {/* Header */}
        <div style={{background:cat.color,padding:'0.9375rem 1.25rem',display:'flex',
          alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:1}}>
          <div>
            <div style={{color:'white',fontWeight:900,fontSize:'1.0625rem'}}>{cat.label} — {date}</div>
            <div style={{color:'rgba(255,255,255,0.88)',fontSize:'0.75rem',marginTop:'0.125rem'}}>
              {status==='yellow'?'⚠ Uwaga':'✗ Problem'} — opisz co się stało
            </div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,0.22)',border:'none',color:'white',
            width:'1.875rem',height:'1.875rem',borderRadius:'50%',cursor:'pointer',fontSize:'1.0rem',
            display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
        </div>

        <div style={{padding:'1.125rem'}}>
          {/* Selected label display */}
          {val&&(
            <div style={{display:'flex',alignItems:'center',gap:'0.5rem',marginBottom:'0.75rem',
              padding:'0.5625rem 0.8125rem',background:AREA_BG[catKey],borderRadius:'0.625rem',
              border:`2px solid ${cat.color}`}}>
              <span style={{flex:1,fontSize:'0.875rem',fontWeight:700,color:'#1e293b'}}>{val}</span>
              <button onClick={()=>setVal('')} style={{border:'none',background:'none',
                cursor:'pointer',color:'#94a3b8',fontSize:'1.125rem',lineHeight:1}}>×</button>
            </div>
          )}

          {/* Label picker */}
          <div style={{fontSize:'0.6875rem',fontWeight:700,color:'#94a3b8',letterSpacing:1,
            textTransform:'uppercase',marginBottom:'0.5rem'}}>Wybierz opis problemu</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'0.4375rem',marginBottom:'0.75rem'}}>
            {allLabels.map(lbl=>{
              const isCustom=!DEFAULT_LABELS[catKey].includes(lbl);
              return(
                <div key={lbl} style={{display:'flex',alignItems:'center'}}>
                  <button onClick={()=>setVal(val===lbl?'':lbl)}
                    style={{border:'2px solid',borderRadius:isCustom&&confirmDel===lbl?'20px 0 0 20px':'20px',
                      padding:'0.375rem 0.8125rem',fontSize:'0.75rem',cursor:'pointer',fontFamily:'inherit',fontWeight:600,
                      background:val===lbl?cat.color:'white',
                      borderColor:val===lbl?cat.color:'#e2e8f0',
                      color:val===lbl?'white':'#475569',
                      borderRight:isCustom?'none':undefined}}>
                    {lbl}
                  </button>
                  {isCustom&&(confirmDel===lbl?(
                    <>
                      <button onClick={()=>{onRemoveLabel(catKey,lbl);if(val===lbl)setVal('');setConfirmDel(null);}}
                        style={{border:'2px solid #ef4444',borderLeft:'none',background:'#ef4444',
                          color:'white',padding:'0.375rem 0.5625rem',cursor:'pointer',fontWeight:700,fontSize:'0.75rem'}}>Usuń</button>
                      <button onClick={()=>setConfirmDel(null)}
                        style={{border:'2px solid #e2e8f0',borderLeft:'none',borderRadius:'0 20px 20px 0',
                          background:'white',color:'#94a3b8',padding:'0.375rem 0.5rem',cursor:'pointer',fontSize:'0.75rem'}}>✕</button>
                    </>
                  ):(
                    <button onClick={()=>setConfirmDel(lbl)}
                      style={{border:'2px solid #e2e8f0',borderLeft:'none',borderRadius:'0 20px 20px 0',
                        background:'#f8fafc',color:'#94a3b8',padding:'0.375rem 0.4375rem',cursor:'pointer',fontSize:'0.6875rem'}}>🗑</button>
                  ))}
                </div>
              );
            })}
            <button onClick={()=>setShowNew(v=>!v)}
              style={{border:'2px dashed #cbd5e1',borderRadius:'1.25rem',padding:'0.375rem 0.8125rem',
                fontSize:'0.75rem',cursor:'pointer',fontFamily:'inherit',fontWeight:600,color:'#94a3b8',background:'white'}}>
              {showNew?'✕':'＋ Nowa etykieta'}
            </button>
          </div>
          {showNew&&(

function LineEditorModal({lines,onSave,onClose}){
  const [draft,setDraft]=useState([...lines]);
  function upd(i,v){setDraft(p=>{const n=[...p];n[i]={...n[i],name:v};return n;});}
  function add(){setDraft(p=>[...p,{id:`l${Date.now()}`,name:'Nowa linia'}]);}
  function del(i){if(draft.length<=1)return;setDraft(p=>p.filter((_,j)=>j!==i));}
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,0.65)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:24}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'white',borderRadius:'1.125rem',width:'100%',maxWidth:400,boxShadow:'0 20px 60px rgba(0,0,0,0.25)',overflow:'hidden'}}>

          <div style={{color:'white',fontWeight:800,fontSize:'0.9375rem'}}>⚙ Zarządzaj liniami</div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,0.15)',border:'none',color:'white',width:'1.75rem',height:'1.75rem',borderRadius:'50%',cursor:'pointer',fontSize:'0.9375rem',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
        </div>
        <div style={{padding:18}}>
          {draft.map((l,i)=>(
            <div key={l.id} style={{display:'flex',gap:'0.4375rem',marginBottom:'0.4375rem',alignItems:'center'}}>
              <input value={l.name} onChange={e=>upd(i,e.target.value)}
                style={{flex:1,border:'2px solid #e2e8f0',borderRadius:'0.5625rem',padding:'0.5625rem 0.75rem',fontSize:'0.8125rem',fontFamily:'inherit',outline:'none'}}/>

            <button onClick={()=>onSave(draft)} style={{flex:2,background:'#0f172a',color:'white',border:'none',borderRadius:'0.625rem',padding:'0.625rem',fontWeight:700,fontSize:'0.8125rem',cursor:'pointer',fontFamily:'inherit'}}>Zapisz</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── SQUARE RING ─────────────────────────────────────────────────────────────
function SquareRing({cat,year,month,line,entries,onToggle}){
  const now=new Date();
  const today=now.getDate();
  const isCurMon=year===now.getFullYear()&&month===now.getMonth();
  const days=daysInMonth(year,month);
  const cx=160,cy=160,r=120,strokeW=28;
  const segAngle=(2*Math.PI)/days, gap=0.018;

  const ms=`${year}-${String(month+1).padStart(2,'0')}`;
  const dayList=Object.values(entries).filter(e=>e.date.startsWith(ms)&&e.line===line);
  const gN=dayList.filter(e=>e[cat.key]==='green').length;
  const yN=dayList.filter(e=>e[cat.key]==='yellow').length;
  const rN=dayList.filter(e=>e[cat.key]==='red').length;
  const filled=gN+yN+rN;
  const pct=filled>0?Math.round((gN/filled)*100):null;

  const segs=[];
  for(let d=1;d<=days;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const k=eKey(line,ds);
    const st=entries[k]?.[cat.key]??null;
    const future=isCurMon&&d>today;  // FIX 3: future days truly blocked
    const wknd=isWknd(year,month,d);
    const startA=-Math.PI/2+(d-1)*segAngle+gap/2;
    const endA=startA+segAngle-gap;
    const ri=r-strokeW/2,ro=r+strokeW/2;
    const x1=cx+ri*Math.cos(startA),y1=cy+ri*Math.sin(startA);
    const x2=cx+ro*Math.cos(startA),y2=cy+ro*Math.sin(startA);
    const x3=cx+ro*Math.cos(endA),  y3=cy+ro*Math.sin(endA);
    const x4=cx+ri*Math.cos(endA),  y4=cy+ri*Math.sin(endA);
    const la=segAngle-gap>Math.PI?1:0;
    const path=`M${x1} ${y1} A${ri} ${ri} 0 ${la} 1 ${x4} ${y4} L${x3} ${y3} A${ro} ${ro} 0 ${la} 0 ${x2} ${y2}Z`;
    const midA=startA+(segAngle-gap)/2;
    const lx=cx+r*Math.cos(midA),ly=cy+r*Math.sin(midA);
    let fill=st?S_COLOR[st]:wknd?'#bfdbfe':future?'#e9ecef':'#dee2e6';
    let textFill=st?S_TEXT[st]:wknd?'#1e40af':future?'#c8d0db':'#868e96';
    const isToday=isCurMon&&d===today;
    const fSize=days===31?'7.5':days===30?'8':'9';
    segs.push(
      <g key={d}
        onClick={()=>!future&&onToggle(line,ds,cat.key)}  // FIX 3: future = nie klikalne
        style={{cursor:future?'default':'pointer'}}>
        <path d={path} fill={fill}
          stroke={isToday?'#0f172a':wknd&&!st?'#93c5fd':'white'}
          strokeWidth={isToday?2.5:1.5}
          opacity={future?0.35:1}/>  // FIX 3: future wyraźnie wyszarzone
        <text x={lx} y={ly} textAnchor="middle" dominantBaseline="middle"
          fontSize={fSize} fontWeight={wknd?"800":"700"} fill={textFill}
          style={{pointerEvents:'none',userSelect:'none'}}>{d}</text>
      </g>
    );
  }
  // FIX 1: Usunięto % — tylko litera wycentrowana w środku kółka
  return(
    <div style={{position:'relative',width:'100%',paddingBottom:'100%'}}>
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <svg width="100%" height="100%" viewBox="0 0 320 320">
          {segs}
          {/* FIX 1: litera wycentrowana pionowo (cy=160, nie cy-14) */}
          <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle"
            fontSize="72" fontWeight="900" fill={cat.color}
            style={{fontFamily:'inherit',userSelect:'none'}}>{cat.key}</text>
        </svg>
      </div>
    </div>
  );
}

    no_data: 'Brak danych — kliknij segmenty kółka aby oznaczyć dni.',
  },
};

function GoalSection({ cat, currentPct, goalVal, onSetGoal }) {
  const [editing, setEditing] = useState(false);
  const [inputVal, setInputVal] = useState('');
  const desc = LEAN_DESCRIPTIONS[cat.key];
  const effectiveGoal = goalVal !== null ? goalVal : DEFAULT_GOALS[cat.key];

  // Determine status
  const achieved = currentPct !== null && currentPct >= effectiveGoal;
  const missed   = currentPct !== null && currentPct < effectiveGoal;
  const status   = currentPct === null ? 'no_data' : achieved ? 'achieved' : 'missed';
  const statusInfo = status !== 'no_data' ? desc[status] : null;

  function startEdit() {
    setInputVal(String(effectiveGoal));
    setEditing(true);
  }
  function saveGoal() {
    const v = parseFloat(inputVal);
    if (!isNaN(v) && v >= 0 && v <= 100) onSetGoal(v);
    setEditing(false);
  }

  // Gap bar: show wynik vs cel
  const barWidth = currentPct !== null ? Math.min(currentPct, 100) : 0;
  const goalPos  = Math.min(effectiveGoal, 100);

  return (
    <div style={{borderTop:'3px solid #e2e8f0',flexShrink:0}}>
      {/* Header */}
      <div style={{background:'#1e293b',padding:'0.5rem 0.875rem',display:'flex',
        alignItems:'center',justifyContent:'space-between'}}>
        <span style={{color:'white',fontWeight:700,fontSize:'0.6875rem',letterSpacing:1}}>
          CEL MIESIĄCA (LEAN TARGET)
        </span>
        <span style={{color:'rgba(255,255,255,0.5)',fontSize:'0.625rem'}}>{desc.goal_hint}</span>
      </div>

      <div style={{padding:'0.75rem 0.875rem',background:'#f8fafc'}}>
        {/* Wynik / Cel display — format Lean: Wynik / Cel */}
        <div style={{display:'flex',alignItems:'center',gap:'0.625rem',marginBottom:'0.625rem',flexWrap:'wrap'}}>
          <div style={{display:'flex',alignItems:'baseline',gap:'0.25rem'}}>
            <span style={{fontSize:'0.6875rem',color:'#64748b',fontWeight:600}}>Wynik:</span>
            <span style={{fontSize:'1.375rem',fontWeight:900,
              color: currentPct===null?'#94a3b8': achieved?'#059669':'#dc2626'}}>
              {currentPct !== null ? `${currentPct.toFixed(1)}%` : '–'}
            </span>
          </div>
          <span style={{fontSize:'1.125rem',color:'#cbd5e1',fontWeight:300}}>/</span>
          <div style={{display:'flex',alignItems:'baseline',gap:'0.25rem'}}>
            <span style={{fontSize:'0.6875rem',color:'#64748b',fontWeight:600}}>Cel:</span>
            {editing ? (
              <div style={{display:'flex',gap:'0.3125rem',alignItems:'center'}}>
                <input
                  value={inputVal}
                  onChange={e=>setInputVal(e.target.value)}
                  onKeyDown={e=>{ if(e.key==='Enter') saveGoal(); if(e.key==='Escape') setEditing(false); }}
                  autoFocus
                  style={{width:64,border:`2px solid ${cat.color}`,borderRadius:'0.4375rem',
                    padding:'0.1875rem 0.4375rem',fontSize:'1.0rem',fontWeight:800,fontFamily:'inherit',
                    outline:'none',textAlign:'center',color:cat.color}}/>
                <span style={{fontSize:'0.875rem',fontWeight:700,color:cat.color}}>%</span>
                <button onClick={saveGoal}
                  style={{background:cat.color,border:'none',borderRadius:'0.375rem',
                    padding:'0.1875rem 0.5625rem',color:'white',fontWeight:700,fontSize:'0.75rem',
                    cursor:'pointer',fontFamily:'inherit'}}>✓</button>
                <button onClick={()=>setEditing(false)}
                  style={{background:'#f1f5f9',border:'none',borderRadius:'0.375rem',
                    padding:'0.1875rem 0.4375rem',color:'#64748b',fontSize:'0.75rem',cursor:'pointer'}}>✕</button>
              </div>
            ) : (
              <button onClick={startEdit}
                style={{background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',
                  display:'flex',alignItems:'baseline',gap:'0.125rem'}}>
                <span style={{fontSize:'1.375rem',fontWeight:900,color:cat.color}}>
                  {effectiveGoal}%
                </span>
                <span style={{fontSize:'0.625rem',color:'#94a3b8',marginLeft:'0.1875rem'}}>✎</span>
              </button>
            )}
          </div>
          {goalVal === null && (
            <span style={{fontSize:'0.625rem',background:'#fef3c7',color:'#92400e',
              padding:'0.125rem 0.4375rem',borderRadius:'0.625rem',fontWeight:600}}>
              domyślny Lean
            </span>
          )}
        </div>

        {/* Progress bar with goal marker */}
        <div style={{position:'relative',marginBottom:'0.75rem'}}>
          <div style={{height:8,background:'#e2e8f0',borderRadius:'0.25rem',overflow:'visible',position:'relative'}}>
            {/* Actual result bar */}
            <div style={{height:'100%',width:`${barWidth}%`,borderRadius:'0.25rem',
              background: achieved?'#10b981': missed?'#ef4444':'#94a3b8',
              transition:'width 0.3s ease'}}/>
            {/* Goal marker line */}
            <div style={{position:'absolute',top:-4,left:`${goalPos}%`,
              width:2,height:16,background:cat.color,borderRadius:1,
              transform:'translateX(-50%)'}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',
            marginTop:'0.25rem',fontSize:'0.625rem',color:'#94a3b8'}}>
            <span>0%</span>
            <span style={{color:cat.color,fontWeight:700}}>↑ Cel: {effectiveGoal}%</span>
            <span>100%</span>
          </div>
        </div>

        {/* Lean status card */}
        {status === 'no_data' ? (
          <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:'0.625rem',
            padding:'0.5625rem 0.75rem',fontSize:'0.6875rem',color:'#94a3b8',textAlign:'center'}}>
            {desc.no_data}
          </div>
        ) : (
          <div style={{background:statusInfo.bg,border:`1.5px solid ${statusInfo.border}`,
            borderRadius:'0.625rem',padding:'0.625rem 0.8125rem'}}>
            {/* Title */}
            <div style={{fontWeight:800,fontSize:'0.8125rem',color:statusInfo.color,marginBottom:'0.3125rem'}}>
              {statusInfo.title}
              {missed && currentPct !== null && (
                <span style={{fontSize:'0.6875rem',fontWeight:600,marginLeft:'0.5rem',
                  background:'#fee2e2',color:'#dc2626',padding:'0.0625rem 0.5rem',borderRadius:'0.625rem'}}>
                  odchylenie: {(currentPct - effectiveGoal).toFixed(1)}%
                </span>
              )}
            </div>
            {/* Main description */}
            <div style={{fontSize:'0.75rem',color:'#1e293b',lineHeight:1.5,marginBottom:'0.375rem'}}>
              {statusInfo.desc}
            </div>
            {/* Lean principle */}
            <div style={{fontSize:'0.6875rem',color:statusInfo.color,lineHeight:1.5,
              background:'white',borderRadius:'0.4375rem',padding:'0.4375rem 0.625rem',
              border:`1px solid ${statusInfo.border}`,fontStyle:'italic'}}>
              💡 {statusInfo.lean}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── PROBLEM TABLE (only "Problem" column) ────────────────────────────────────
function ProblemTable({cat,line,issues,setIssues,onDeleteIssue,year,month,currentPct,goalVal,onSetGoal,locations}){
  const [editId,setEditId]=useState(null);
  const [editTitle,setEditTitle]=useState('');

  const locs = locations || DEFAULT_LOCATIONS;
  function getLocMeta(locId){
    const l = locs.find(x=>x.id===locId);
    if(!l) return null;
    const base = LOC_TYPE_META[l.type]||LOC_TYPE_META.other;
    // For custom stat types (not 'other','client','prod'), use green colour
    const isCustomStat = l.type!=='other'&&l.type!=='client'&&l.type!=='prod';
    return {
      ...l,
      bg:    isCustomStat ? '#d1fae5' : base.bg,
      color: isCustomStat ? '#065f46' : base.color,
      label: isCustomStat ? `→ ${l.statLabel||l.type}` : base.label,
    };
  }

  const monthStr=`${year}-${String(month+1).padStart(2,'0')}`;
const rows=issues.filter(i=>i.line===line&&i.area===cat.key&&(i.date||i.created_at||'').startsWith(monthStr));

  function startEdit(i){setEditId(i.id);setEditTitle(i.title);}
  function saveEdit(i){
  setIssues(prev=>prev.map(x=>x.id===i.id?{...x,title:editTitle}:x));
  db.from('sqdp_issues').update({title: editTitle, updated_at: new Date().toISOString()})
    .eq('id', i.id)
    .then(({error})=>{ if(error) console.error('Błąd zapisu tytułu:', error.message); });
  setEditId(null);
}
  function del(id){ if(onDeleteIssue) onDeleteIssue(id); else setIssues(prev=>prev.filter(x=>x.id!==id)); }
  function cycle(id){
    setIssues(prev=>prev.map(x=>{
      if(x.id!==id) return x;
      const n={open:'in_progress',in_progress:'closed',closed:'open'};
      return{...x,status:n[x.status]||'open'};
    }));
  }

  // Stats: group by unique type (excluding 'other'), keyed by type string
  const totalRows=rows.length;
  // Build stat groups: {type: {count, statLabel, color, bg, barColor, barBg, borderColor}}
  const statGroups = {};
  locs.filter(l=>l.type!=='other').forEach(l=>{
    if(!statGroups[l.type]){
      const isBuiltin = l.type==='client'||l.type==='prod';
      const base = LOC_TYPE_META[l.type]||null;
      statGroups[l.type]={
        statLabel: l.statLabel || l.type,
        color:     base?.color || '#065f46',
        bg:        base?.bg    || '#d1fae5',
        barColor:  l.type==='client'?'#ef4444': l.type==='prod'?'#f59e0b':'#10b981',
        barBg:     l.type==='client'?'#fee2e2': l.type==='prod'?'#fef3c7':'#d1fae5',
        border:    l.type==='client'?'#fecaca': l.type==='prod'?'#fed7aa':'#a7f3d0',
        count: 0,
      };
    }
  });
  rows.forEach(i=>{
    const l=locs.find(x=>x.id===i.location);
    if(l&&l.type!=='other'&&statGroups[l.type]) statGroups[l.type].count++;
  });
  const statTypes = Object.keys(statGroups);

  const EMPTY_COUNT=6;

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      {/* Header — only "Problem" */}
      <div style={{background:cat.color,padding:'0.5rem 0.875rem',display:'flex',alignItems:'center',
        justifyContent:'space-between',flexShrink:0}}>
        <span style={{color:'white',fontWeight:800,fontSize:'0.75rem',letterSpacing:1}}>PROBLEMY</span>
        <span style={{color:'rgba(255,255,255,0.85)',fontSize:'0.6875rem',fontWeight:700}}>PROBLEM</span>
      </div>

      {/* Rows */}
      <div style={{flex:1,display:'flex',flexDirection:'column',background:'white'}}>
        {rows.length===0?(
          Array.from({length:EMPTY_COUNT}).map((_,i)=>(
            <div key={i} style={{flex:1,borderBottom:'1px solid #f1f5f9',padding:'0.625rem 0.875rem',
              display:'flex',alignItems:'center',minHeight:'2.375rem'}}>
              <div style={{borderBottom:'1px dashed #e2e8f0',width:'100%',height:1}}/>
            </div>
          ))
        ):(
          <>
            {rows.map(issue=>(
              <div key={issue.id} style={{borderBottom:'1px solid #f1f5f9',
                padding:'0.6rem 0.875rem',display:'flex',
                alignItems:'flex-start',gap:'0.5rem',minHeight:'3rem'}}>
                {editId===issue.id?(
                  <div style={{display:'flex',gap:'0.3125rem',flex:1}}>
                    <input value={editTitle} onChange={e=>setEditTitle(e.target.value)}
                      onKeyDown={e=>e.key==='Enter'&&saveEdit(issue)}
                      style={{flex:1,border:'1.5px solid #3b82f6',borderRadius:'0.4375rem',
                        padding:'0.3125rem 0.5625rem',fontSize:'0.75rem',
                        fontFamily:'inherit',outline:'none'}} autoFocus/>
                    <button onClick={()=>saveEdit(issue)}
                      style={{background:'#10b981',border:'none',borderRadius:'0.375rem',
                        padding:'0.3125rem 0.5625rem',color:'white',fontWeight:700,
                        fontSize:'0.75rem',cursor:'pointer',fontFamily:'inherit',flexShrink:0}}>✓</button>
                    <button onClick={()=>setEditId(null)}
                      style={{background:'#f1f5f9',border:'none',borderRadius:'0.375rem',
                        padding:'0.3125rem 0.4375rem',color:'#94a3b8',
                        fontSize:'0.75rem',cursor:'pointer',flexShrink:0}}>✕</button>
                  </div>
                ):(
                  <div style={{flex:1,minWidth:0}}>
                    {/* Data + lokalizacja w jednej linii */}
                    <div style={{display:'flex',alignItems:'center',gap:'0.375rem',
                      marginBottom:'0.25rem',flexWrap:'wrap'}}>
                      <span style={{fontSize:'0.625rem',color:'#94a3b8',fontWeight:600,
                        background:'#f8fafc',padding:'0.125rem 0.375rem',
                        borderRadius:'0.375rem',flexShrink:0,whiteSpace:'nowrap'}}>
                        {issue.date||'—'}
                      </span>
                      {issue.location&&(()=>{
                        const meta=getLocMeta(issue.location);
                        if(!meta) return null;
                        return(
                          <span style={{fontSize:'0.625rem',fontWeight:700,flexShrink:0,
                            whiteSpace:'nowrap',padding:'0.125rem 0.4375rem',borderRadius:'0.625rem',
                            background:meta.bg, color:meta.color}}>
                            {meta.label}
                          </span>
                        );
                      })()}
                      <button onClick={()=>cycle(issue.id)}
                        style={{border:'none',borderRadius:'0.625rem',
                          padding:'0.125rem 0.5rem',fontSize:'0.625rem',fontWeight:700,
                          cursor:'pointer',fontFamily:'inherit',flexShrink:0,
                          background:STATUS_META[issue.status].bg,
                          color:STATUS_META[issue.status].color}}>
                        {STATUS_META[issue.status].label}
                      </button>
                      <button onClick={()=>del(issue.id)}
                        style={{background:'none',border:'none',cursor:'pointer',
                          color:'#e2e8f0',fontSize:'0.9375rem',lineHeight:1,
                          flexShrink:0,marginLeft:'auto'}}>×</button>
                    </div>
                    {/* FIX 4: pełny tekst z zawijaniem — kliknij aby edytować */}
                    <div
                      onClick={()=>startEdit(issue)}
                      title="Kliknij aby edytować"
                      style={{
                        fontSize:'0.8125rem',
                        color:'#1e293b',
                        fontWeight:600,
                        lineHeight:1.5,
                        cursor:'pointer',
                        wordBreak:'break-word',    // zawijaj długie słowa
                        whiteSpace:'normal',        // zawijaj tekst
                        overflowWrap:'break-word',
                      }}>
                      {issue.title||
                        <span style={{color:'#cbd5e1',fontStyle:'italic'}}>brak opisu</span>}
                    </div>
                    {issue.desc&&(
                      <div style={{fontSize:'0.6875rem',color:'#64748b',marginTop:'0.125rem',
                        lineHeight:1.4,wordBreak:'break-word',whiteSpace:'normal'}}>
                        {issue.desc}
                      </div>
                    )}
                  </div>
                )}
              </div>
            ))}
            {rows.length<EMPTY_COUNT&&Array.from({length:EMPTY_COUNT-rows.length}).map((_,i)=>(
              <div key={`e${i}`} style={{flex:1,borderBottom:'1px solid #f8fafc',padding:'0.5625rem 0.875rem',
                display:'flex',alignItems:'center',minHeight:'2.375rem'}}>
                <div style={{borderBottom:'1px dashed #e2e8f0',width:'100%',height:1}}/>
              </div>
            ))}
          </>
        )}
      </div>

      {/* ── STATS SECTION — dynamic based on location types ── */}
      <div style={{background:'#f8fafc',borderTop:'3px solid #e2e8f0',padding:'0.625rem 0.875rem',flexShrink:0}}>
        <div style={{fontSize:'0.6875rem',fontWeight:700,color:'#64748b',letterSpacing:1,
          textTransform:'uppercase',marginBottom:'0.5rem'}}>Statystyki błędów</div>
        {statTypes.length===0?(
          <div style={{fontSize:'0.625rem',color:'#94a3b8',textAlign:'center',padding:'0.25rem 0'}}>
            Brak kategorii statystyk — skonfiguruj miejsca niezgodności
          </div>
        ):(
          <div style={{display:'grid',
            gridTemplateColumns:`repeat(${Math.min(statTypes.length,3)},1fr)`,gap:'0.5rem'}}>
            {statTypes.map(type=>{
              const g=statGroups[type];
              const pct=totalRows>0?Math.round((g.count/totalRows)*100):0;
              return(
                <div key={type} style={{background:'white',borderRadius:'0.625rem',
                  padding:'0.5625rem 0.6875rem',border:`1px solid ${g.border}`}}>
                  <div style={{fontSize:'0.625rem',color:'#94a3b8',fontWeight:600,marginBottom:'0.25rem'}}>
                    {g.statLabel}
                  </div>
                  <div style={{display:'flex',alignItems:'baseline',gap:'0.3125rem'}}>
                    <span style={{fontSize:'1.25rem',fontWeight:900,color:g.color}}>{g.count}</span>
                    <span style={{fontSize:'0.6875rem',color:'#94a3b8'}}>({pct}%)</span>
                  </div>
                  {totalRows>0&&(
                    <div style={{marginTop:'0.3125rem',height:4,background:g.barBg,borderRadius:3,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${pct}%`,background:g.barColor,borderRadius:3}}/>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
        {totalRows>0&&(
          <div style={{fontSize:'0.625rem',color:'#94a3b8',textAlign:'center',marginTop:'0.4375rem'}}>
            Łącznie {totalRows} {totalRows===1?'problem':totalRows<5?'problemy':'problemów'} w tym miesiącu
          </div>
        )}
      </div>

      {/* koniec ProblemTable */}
    </div>
  );
}

// ─── SQDP COLUMN ─────────────────────────────────────────────────────────────
function SqdpColumn({cat,year,month,line,entries,issues,setIssues,onDeleteIssue,onToggle,onCatClick,goals,setGoals,locations}){
  const ms=`${year}-${String(month+1).padStart(2,'0')}`;
  const dayList=Object.values(entries).filter(e=>e.date.startsWith(ms)&&e.line===line);
  const gN=dayList.filter(e=>e[cat.key]==='green').length;
  const yN=dayList.filter(e=>e[cat.key]==='yellow').length;
  const rN=dayList.filter(e=>e[cat.key]==='red').length;
  // Current KPI for this cat/month/line
  const filled=gN+yN+rN;
  const currentPct = filled>0 ? Math.round((gN/filled)*10000)/100 : null;
  const goalKey = `${line}-${year}-${month}-${cat.key}`;
  const goalVal = goals[goalKey] ?? null;
  return(
    <div
      className="sqdp-column"
      style={{
        flex:'1 1 0',
        minWidth:0,
        maxWidth:'380px',
        display:'flex',
        flexDirection:'column',
      }}>
      <button onClick={onCatClick}
        style={{background:cat.color,border:'none',borderRadius:'0.75rem 0.75rem 0 0',padding:'0.625rem 0',
          textAlign:'center',cursor:'pointer',fontFamily:'inherit',
          display:'flex',alignItems:'center',justifyContent:'center',gap:'0.375rem',width:'100%',flexShrink:0}}>
        <span style={{color:'white',fontWeight:900,fontSize:'0.8125rem',letterSpacing:3}}>{cat.label}</span>
        <span style={{color:'rgba(255,255,255,0.65)',fontSize:'0.6875rem'}}>ℹ</span>
      </button>
      <div style={{background:'white',border:`2px solid ${cat.light}`,borderTop:'none',
        borderRadius:'0 0 0.75rem 0.75rem',flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Ring wrapper — hard cap prevents enormous rings on 50" */}
        <div
          className="sqdp-ring-wrap"
          style={{
            padding:'0.5rem 0.75rem 0.25rem',
            flexShrink:0,
            width:'100%',
            maxWidth:'340px',
            alignSelf:'center',
          }}>
          <SquareRing cat={cat} year={year} month={month} line={line} entries={entries} onToggle={onToggle}/>
        </div>
        <div style={{display:'flex',justifyContent:'center',gap:'0.625rem',padding:'0.25rem 0.5rem 0.375rem',
          flexShrink:0,flexWrap:'wrap'}}>
          {[['#10b981',gN,'✓ cel'],['#f59e0b',yN,'! uwaga'],['#ef4444',rN,'✗ problem'],
            ['#bfdbfe',null,'So/Nd']].map(([c,n,s])=>(
            <span key={s} style={{display:'flex',alignItems:'center',gap:'0.1875rem',fontSize:'0.6875rem',fontWeight:700,
              color:c==='#bfdbfe'?'#1e40af':'#64748b'}}>
              <span style={{width:9,height:9,borderRadius:'50%',background:c,
                border:c==='#bfdbfe'?'1.5px solid #93c5fd':'none',display:'inline-block'}}/>
              {n!==null?`${n} `:''}  {s}
            </span>
          ))}
        </div>
        <div style={{flex:1,overflow:'auto',borderTop:`2px solid ${cat.light}`}}>
          <ProblemTable cat={cat} line={line} issues={issues} setIssues={setIssues} onDeleteIssue={onDeleteIssue}
            year={year} month={month}
            currentPct={currentPct} goalVal={goalVal}
            onSetGoal={v=>setGoals(prev=>({...prev,[goalKey]:v}))}
            locations={locations}/>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN BOARD ───────────────────────────────────────────────────────────────
function MainBoard({entries,onToggle,onReset,issues,setIssues,onDeleteIssue,lines,setLines,onSummary,goals,setGoals,locations,setLocations}){
  const now=new Date();
  const [year,  setYear]  =useState(now.getFullYear());
  const [month, setMonth] =useState(now.getMonth());
  const [lineIdx,setLineIdx]=useState(0);
  const [modal,     setModal]    =useState(null);
  const [showReset, setShowReset]=useState(false);
  const [showLineEd,setShowLineEd]=useState(false);
  const [catInfo,   setCatInfo]  =useState(null);
  const [showHelp,  setShowHelp] =useState(false);
  const [customLabels,setCustomLabels]=useState({S:[],Q:[],D:[],P:[]});

  const line=lines[lineIdx]?.name||'Linia';

  function prevM(){if(month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1);}
  function nextM(){if(month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1);}

  function handleToggle(ln,ds,catKey){
    const k=eKey(ln,ds);
    const cur=entries[k]?.[catKey]??null;
    const next=CYCLE[cur];
    // next===null = 4. kliknięcie = reset — App root czyści wszystko
    onToggle(ln,ds,catKey,next,null,null);
    const same=modal&&modal.line===ln&&modal.date===ds&&modal.catKey===catKey;
    if(next===null){
      // Reset — zamknij modal jeśli był otwarty dla tego segmentu
      if(same) setModal(null);
    } else if(next==='yellow'||next==='red'){
      if(!same) setModal({line:ln,date:ds,catKey});
    } else if(next==='green'){
      if(same) setModal(null);
    }
  }

  function handleSaveComment(val,loc){
    if(modal){
      const k=eKey(modal.line,modal.date);
      const status=entries[k]?.[modal.catKey]; // 'yellow' lub 'red' — zachowaj ten kolor
      if(val.trim()||loc){
        const existIdx=issues.findIndex(i=>i._ek===k&&i.area===modal.catKey);
        if(existIdx>=0){
          setIssues(prev=>prev.map((x,i)=>i===existIdx
            ?{...x,title:val||x.title,location:loc||x.location,
               status:status==='red'?'open':'in_progress',date:modal.date}:x));
        } else {
          setIssues(prev=>[{
            id:`a-${Date.now()}`,_ek:k,area:modal.catKey,
            title:val||'(brak opisu)',location:loc||'',
            status:status==='red'?'open':'in_progress',
            line:modal.line,date:modal.date,created:todayStr(),
          },...prev]);
        }
      }
      // Przekazuj aktualny status (yellow/red) a nie null — żeby kolor nie znikał
      onToggle(modal.line,modal.date,modal.catKey,status,val,loc);
    }
    setModal(null);
  }

  function addCustomLabel(catKey,lbl){
    setCustomLabels(prev=>({...prev,[catKey]:[...prev[catKey].filter(x=>x!==lbl),lbl]}));
  }
  function removeCustomLabel(catKey,lbl){
    setCustomLabels(prev=>({...prev,[catKey]:prev[catKey].filter(x=>x!==lbl)}));
  }
  function doReset(){onReset(line,year,month);setShowReset(false);}

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden',background:'#f1f5f9'}}>
      {/* ── TOP BAR ── */}
      <div style={{background:'#0f172a',padding:'0.625rem 1.25rem',display:'flex',alignItems:'center',gap:'0.75rem',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:'0.4375rem'}}>
          {['S','Q','D','P'].map((l,i)=>(
            <div key={l} style={{width:'1.625rem',height:'1.625rem',borderRadius:'0.4375rem',
              background:['#f59e0b','#10b981','#3b82f6','#ef4444'][i],
              display:'flex',alignItems:'center',justifyContent:'center',
              color:'white',fontWeight:900,fontSize:'0.75rem'}}>{l}</div>
          ))}
          <span style={{color:'white',fontWeight:800,fontSize:'1.125rem',marginLeft:'0.25rem',letterSpacing:2}}>TABLICA SQDP</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'0.3125rem'}}>
          {lines.map((l,i)=>(
            <button key={l.id} onClick={()=>setLineIdx(i)}
              style={{border:'2px solid',borderRadius:'0.5rem',padding:'0.3125rem 0.8125rem',fontSize:'0.8125rem',fontWeight:700,
                cursor:'pointer',fontFamily:'inherit',
                background:lineIdx===i?'rgba(255,255,255,0.15)':'transparent',
                borderColor:lineIdx===i?'rgba(255,255,255,0.5)':'rgba(255,255,255,0.2)',
                color:lineIdx===i?'white':'rgba(255,255,255,0.5)'}}>
              {l.name}
            </button>
          ))}
          <button onClick={()=>setShowLineEd(true)}
            style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.2)',
              color:'rgba(255,255,255,0.5)',borderRadius:'0.4375rem',width:'1.625rem',height:'1.625rem',cursor:'pointer',
              fontSize:'0.8125rem',display:'flex',alignItems:'center',justifyContent:'center'}}>⚙</button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'0.4375rem',marginLeft:'auto'}}>
          <button onClick={prevM} style={{background:'rgba(255,255,255,0.1)',border:'none',color:'white',
            width:'1.875rem',height:'1.875rem',borderRadius:'0.4375rem',cursor:'pointer',fontSize:'1.0rem',
            display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
          <span style={{color:'white',fontWeight:700,fontSize:'0.875rem',minWidth:'6.5625rem',textAlign:'center'}}>
            {MONTHS_PL[month]} {year}
          </span>
          <button onClick={nextM} style={{background:'rgba(255,255,255,0.1)',border:'none',color:'white',
            width:'1.875rem',height:'1.875rem',borderRadius:'0.4375rem',cursor:'pointer',fontSize:'1.0rem',
            display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
        </div>
        <button onClick={()=>setShowReset(true)}

        <button onClick={onSummary}

          📊 Podsumowanie
        </button>
        {/* Help */}
        <button onClick={()=>setShowHelp(true)}
          title="Pomoc — opis funkcji aplikacji"
          style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.2)',
            color:'rgba(255,255,255,0.7)',borderRadius:'0.5rem',
            padding:'0.375rem 0.75rem',fontSize:'0.75rem',fontWeight:600,
            cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:'0.25rem'}}>
          ❓ Pomoc
        </button>
      </div>

      {/* ── BOARD ── */}
      <div style={{flex:1,overflowY:'auto',padding:'0.75rem 1rem'}}>
        {/* Centred wrapper — caps total board width on ultra-wide / 50" screens */}

          maxWidth:'1600px',      /* board never wider than 1600px */

        </span>
        <span style={{color:'#cbd5e1'}}>|</span>
        <span>Kliknij nagłówek S/Q/D/P → opis. Kliknij tekst problemu → edycja.</span>
        <span style={{marginLeft:'auto',color:'rgba(100,116,139,0.6)',fontSize:'0.625rem',fontStyle:'italic'}}>
          Designed by Piotr Mieczkowski
        </span>
      </div>

      {/* MODALS */}
      {modal&&<CommentModal info={modal} entries={entries} onSave={handleSaveComment}
        onClose={()=>setModal(null)} customLabels={customLabels}
        onAddLabel={addCustomLabel} onRemoveLabel={removeCustomLabel}
        locations={locations} setLocations={setLocations}/>}
      {showReset&&<ResetModal year={year} month={month} line={line}
        onConfirm={doReset} onClose={()=>setShowReset(false)}/>}
      {showLineEd&&<LineEditorModal lines={lines}
        onSave={nl=>{setLines(nl);setLineIdx(0);setShowLineEd(false);}}
        onClose={()=>setShowLineEd(false)}/>}
      {catInfo&&<CatInfoModal catKey={catInfo} onClose={()=>setCatInfo(null)}/>}
      {showHelp&&<HelpPanel onClose={()=>setShowHelp(false)}/>}
    </div>
  );
}

// ─── HISTORICAL DATA from ODS (Unisystem) ────────────────────────────────────
// Tabela podsumowania — bieżący rok, puste wiersze do samodzielnego uzupełnienia.
// S/Q/D/P będą pobierane live z tablicy gdy uzupełnisz kółka.
// Pozostałe kolumny (wydania, pomyłki) wypełniasz ręcznie z systemu WMS/ERP.
const HIST_UNISYSTEM = (() => {
  const now = new Date();
  const currentYear = now.getFullYear();
  const currentMonth = now.getMonth(); // 0-indexed
  const rows = [];
  for (let m = 0; m <= currentMonth; m++) {
    rows.push({
      year: currentYear, month: m,
      S: null, Q: null, D: null, P: null, razem: null,
      wyd_poz: null, wyd_dok: null, pomylki: null,
      przyjecia_poz: null, przyjecia_dok: null,
    });
  }
  return rows;
})();

// ─── SUMMARY SCREEN ───────────────────────────────────────────────────────────
function Summary({entries, lines, onBoard, extraCols, setExtraCols, extraData, setExtraData, issues, locations, onSaveCell}) {
  const now = new Date();
  const [summLine, setSummLine] = useState(lines[0]?.name || 'Unisystem');
  const [editingCol, setEditingCol] = useState(null);
  const [newColLabel, setNewColLabel] = useState('');

  // Build list of months to show — historical + live from entries
  // Collect all unique year-month from entries for this line
  const entryMonths = new Set();
  Object.values(entries).forEach(e => {
    if (e.line === summLine) {
      const [y,m] = e.date.split('-').map(Number);
      entryMonths.add(`${y}-${m-1}`); // m-1 = 0-indexed month
    }
  });

  // Merge historical rows with live rows
function calcKpiFromEntries(line, year, month) {
  const ms = `${year}-${String(month+1).padStart(2,'0')}`;
  const list = Object.values(entries).filter(e => e.date.startsWith(ms) && e.line === line);
  if (!list.length) return null;
  // Liczymy tylko dni z jawnym zaznaczeniem (green/yellow/red)
  // Szare (null) = święto lub dzień wolny = nie wchodzi do mianownika
  const pct = k => {
    const filled = list.filter(e => e[k] !== null);
    if (!filled.length) return null;
    return Math.round(filled.filter(e => e[k]==='green').length / filled.length * 10000) / 10000;
  };

  const S=pct('S'), Q=pct('Q'), D=pct('D'), P=pct('P');
  // razem: średnia tylko z tych kategorii które mają dane
  const vals=[S,Q,D,P].filter(v=>v!==null);
  const razem = vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*10000)/10000 : null;
  return {S,Q,D,P,razem};
}

  // All rows: historical + any live months not in history
  const allRows = (() => {
    const rows = [];
    const hist = HIST_UNISYSTEM; // for now same for both lines — in real app would be per line
    hist.forEach(h => {
      const live = calcKpiFromEntries(summLine, h.year, h.month);
      rows.push({...h, live, isLive: false, key:`${h.year}-${h.month}`});
    });
    // Add live months not in historical data
    entryMonths.forEach(ym => {
      const [y, m] = ym.split('-').map(Number);
      if (!hist.find(h => h.year===y && h.month===m)) {
        const live = calcKpiFromEntries(summLine, y, m);
        if (live) rows.push({year:y, month:m, live, isLive:true,
          S:null,Q:null,D:null,P:null,razem:null,
          wyd_poz:null,wyd_dok:null,pomylki:null,
          przyjecia_poz:null,przyjecia_dok:null,
          key:`${y}-${m}`});
      }
    });
    rows.sort((a,b) => a.year!==b.year ? a.year-b.year : a.month-b.month);
    return rows;
  })();

  // For a row, get the effective S/Q/D/P — prefer live data if available
  function getKpi(row) {
    const live = calcKpiFromEntries(summLine, row.year, row.month);
    if (live) return live;
    if (row.S !== null) return {S:row.S, Q:row.Q, D:row.D, P:row.P, razem:row.razem};
    return null;
  }

  function fPct(v) {
    if (v === null || v === undefined || isNaN(v)) return '–';
    const pct = v <= 1 ? v * 100 : v;
    return `${pct.toFixed(2)}%`;
  }
  function fNum(v) { return v===null||v===undefined ? '' : String(v); }

  function pctColor(v) {
    if (!v && v!==0) return '#64748b';
    const pct = v<=1 ? v*100 : v;
    return pct >= 99 ? '#059669' : pct >= 95 ? '#d97706' : '#dc2626';
  }

  // Poprawność wydań = (wyd_poz - pomylki) / wyd_poz * 100
  // Wzór: Liczba poprawnie skompletowanych jednostek / Całkowita liczba skompletowanych jednostek × 100%
  function calcPoprawnosc(row) {
    const poz = parseFloat(row.wyd_poz);
    const pom = parseFloat(row.pomylki ?? 0);
    if (!poz || isNaN(poz)) return null;
    return (poz - (isNaN(pom) ? 0 : pom)) / poz;
  }

  function updateCell(rowKey, field, val) {
    setExtraData(prev => ({...prev, [`${summLine}-${rowKey}-${field}`]: val}));
    if (onSaveCell) onSaveCell(summLine, rowKey, field, val);
  }
  function getCell(rowKey, field) {
    return extraData[`${summLine}-${rowKey}-${field}`] ?? '';
  }
  function getHistCell(row, field) {
    if (field === 'c1') return row.przyjecia_poz !== null ? fNum(row.przyjecia_poz) : '';
    if (field === 'c2') return row.przyjecia_dok !== null ? fNum(row.przyjecia_dok) : '';
    return getCell(row.key, field);
  }

  function addColumn() {
    if (!newColLabel.trim()) return;
    setExtraCols(prev => [...prev, {id:`c${Date.now()}`, label:newColLabel.trim()}]);
    setNewColLabel('');
  }
  function removeColumn(id) {
    setExtraCols(prev => prev.filter(c => c.id !== id));
  }

  // ── Stałe etykiety dla kolumn "Poprawność wysyłek" i "Błędy" — edytowalne nazwy ──
  const [colLabels, setColLabels] = useState(()=>{
    try{ const s=localStorage.getItem('sqdp-col-labels'); return s?JSON.parse(s):{
      poprawnosc_wyd:'Poprawność\nwydań %',
      poprawnosc_wys:'Poprawność\nwysyłek %',
      bledy_prod:'Błędy na\nProdukcję',
      bledy_klient:'Błędy do\nklienta',
    };}catch{return {
      poprawnosc_wyd:'Poprawność\nwydań %',
      poprawnosc_wys:'Poprawność\nwysyłek %',
      bledy_prod:'Błędy na\nProdukcję',
      bledy_klient:'Błędy do\nklienta',
    };}
  });
  const [editingFixedCol, setEditingFixedCol] = useState(null);
  function updateColLabel(id, val){
    setColLabels(prev=>{
      const next={...prev,[id]:val};
      try{localStorage.setItem('sqdp-col-labels',JSON.stringify(next));}catch{}
      return next;
    });
  }

  // Pobierz błędy z issues dla danej linii i miesiąca
  function getBledyForMonth(lineName, year, month){
    const ms=`${year}-${String(month+1).padStart(2,'0')}`;
    const locs = locations||DEFAULT_LOCATIONS;
    const monthIssues = (issues||[])
      .filter(i=>i.line===lineName && i.date && i.date.startsWith(ms));
    const bledy_prod = monthIssues.filter(i=>{
      const l=locs.find(x=>x.id===i.location);
      return l && l.type==='prod';
    }).length;
    const bledy_klient = monthIssues.filter(i=>{
      const l=locs.find(x=>x.id===i.location);
      return l && l.type==='client';
    }).length;
    return {bledy_prod, bledy_klient};
  }

  // Poprawność wysyłek = (wysylki - nieterminowe) / wysylki × 100%
  function calcPoprawnosc2(row){
    const wysVal = getCell(row.key,'wysylki');
    const nitVal = getCell(row.key,'nieterminowe');
    const wys = parseFloat(wysVal);
    const nit = parseFloat(nitVal ?? 0);
    if(!wys || isNaN(wys)) return null;
    return (wys - (isNaN(nit)?0:nit)) / wys;
  }

  // Fixed columns definition
  const fixedCols = [
    {id:'S',   label:'S',      tooltip:'Safety %'},
    {id:'Q',   label:'Q',      tooltip:'Quality %'},
    {id:'D',   label:'D',      tooltip:'Delivery %'},
    {id:'P',   label:'P',      tooltip:'Production %'},
    {id:'razem',label:'RAZEM', tooltip:'Średnia S+Q+D+P'},
    {id:'wyd_poz', label:'Wydania\nilość pozycji',   tooltip:'Liczba pozycji na dokumentach RW/MMW'},
    {id:'wyd_dok', label:'Wydania\nilość dok.',       tooltip:'Liczba dokumentów RW/MMW'},
    {id:'pomylki', label:'Pomyłki\nwydań',            tooltip:'Liczba błędnych pozycji'},
    {id:'poprawnosc', label:'Poprawność\nwydań %',   tooltip:'= (pozycje − pomyłki) / pozycje × 100%'},
  ];

  const thStyle = {
    padding:'0.5rem 0.625rem', fontSize:'0.6875rem', fontWeight:700, color:'#fff',
    textAlign:'center', verticalAlign:'bottom', whiteSpace:'pre-line',
    lineHeight:1.3, border:'1px solid rgba(255,255,255,0.2)',
  };
  const tdStyle = {
    padding:'0.4375rem 0.625rem', fontSize:'0.75rem', textAlign:'center',
    border:'1px solid #e2e8f0', verticalAlign:'middle',
  };
  const inputStyle = {
    width:'100%', border:'1px solid #e2e8f0', borderRadius:'0.375rem',
    padding:'0.25rem 0.375rem', fontSize:'0.75rem', fontFamily:'inherit',
    textAlign:'center', outline:'none', background:'transparent',
    boxSizing:'border-box',
  };

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden',background:'#f1f5f9'}}>
      {/* Top bar */}
      <div style={{background:'#0f172a',padding:'0.625rem 1.25rem',display:'flex',alignItems:'center',
        gap:'0.75rem',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:'0.4375rem'}}>
          {['S','Q','D','P'].map((l,i)=>(
            <div key={l} style={{width:'1.625rem',height:'1.625rem',borderRadius:'0.4375rem',
              background:['#f59e0b','#10b981','#3b82f6','#ef4444'][i],
              display:'flex',alignItems:'center',justifyContent:'center',
              color:'white',fontWeight:900,fontSize:'0.75rem'}}>{l}</div>
          ))}
          <span style={{color:'white',fontWeight:800,fontSize:'1.125rem',marginLeft:'0.25rem',letterSpacing:2}}>TABLICA SQDP</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'0.3125rem'}}>
          {lines.map(l=>(
            <button key={l.id} onClick={()=>setSummLine(l.name)}
              style={{border:'2px solid',borderRadius:'0.5rem',padding:'0.3125rem 0.8125rem',fontSize:'0.8125rem',fontWeight:700,
                cursor:'pointer',fontFamily:'inherit',
                background:summLine===l.name?'rgba(255,255,255,0.15)':'transparent',
                borderColor:summLine===l.name?'rgba(255,255,255,0.5)':'rgba(255,255,255,0.2)',
                color:summLine===l.name?'white':'rgba(255,255,255,0.5)'}}>
              {l.name}
            </button>
          ))}
        </div>
        <span style={{color:'rgba(255,255,255,0.4)',fontSize:'0.8125rem',marginLeft:'0.5rem'}}>
          📊 Podsumowanie roczne
        </span>
        <button onClick={onBoard}
          style={{marginLeft:'auto',background:'rgba(255,255,255,0.08)',
            border:'1px solid rgba(255,255,255,0.2)',color:'rgba(255,255,255,0.7)',
            borderRadius:'0.5rem',padding:'0.375rem 0.875rem',fontSize:'0.75rem',fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>
          ← Wróć do tablicy
        </button>
      </div>

      {/* Main content */}
      <div style={{flex:1,overflowY:'auto',padding:'1.25rem 1.25rem 1.5rem'}}>
        {/* Title */}
        <div style={{marginBottom:'1.25rem'}}>
          <h2 style={{margin:0,fontSize:'1.25rem',fontWeight:900,color:'#0f172a'}}>
            📊 Podsumowanie — {summLine}
          </h2>
          <p style={{margin:'0.25rem 0 0',fontSize:'0.75rem',color:'#64748b'}}>

            Pozostałe pola edytowalne ręcznie.

        <div style={{overflowX:'auto',background:'white',borderRadius:'1.0rem',

                <th style={{...thStyle,textAlign:'left',minWidth:'5.625rem'}}>Rok</th>
                <th style={{...thStyle,textAlign:'left',minWidth:'5.625rem'}}>Miesiąc</th>

                  <th key={k} style={{...thStyle,background:
                    {S:'#92400e',Q:'#065f46',D:'#1e3a8a',P:'#7f1d1d'}[k],minWidth:'4.0rem'}}>

                <th style={{...thStyle,background:'#1e293b',minWidth:'4.5rem'}}>RAZEM</th>
                <th style={{...thStyle,minWidth:'5.0rem'}}>{'Wydania\nilość\npozycji'}</th>
                <th style={{...thStyle,minWidth:'4.5rem'}}>{'Wydania\nilość\ndok.'}</th>
                <th style={{...thStyle,background:'#7f1d1d',minWidth:'4.5rem'}}>{'Pomyłki\nwydań'}</th>
                <th style={{...thStyle,background:'#064e3b',minWidth:'5.5rem',cursor:'pointer',userSelect:'none'}}

                  title="Kliknij aby edytować nazwę">

                      autoFocus onClick={e=>e.stopPropagation()}
                      style={{...inputStyle,color:'#0f172a',background:'white',borderRadius:'0.25rem',padding:'0.125rem 0.25rem',width:'5rem'}}/>
                  ):(

                {/* Wysyłki PL/EX — editable */}

                  title="Kliknij aby edytować nazwę">
                  {editingFixedCol==='wysylki_label'?(
                    <input value={colLabels.wysylki||'Wysyłki\nPL/EX'}
                      onChange={e=>updateColLabel('wysylki',e.target.value)}
                      onBlur={()=>setEditingFixedCol(null)}
                      onKeyDown={e=>e.key==='Enter'&&setEditingFixedCol(null)}
                      autoFocus onClick={e=>e.stopPropagation()}
                      style={{...inputStyle,color:'#0f172a',background:'white',borderRadius:'0.25rem',padding:'0.125rem 0.25rem',width:'5rem'}}/>
                  ):(

                      {colLabels.wysylki||'Wysyłki\nPL/EX'}
                      <span style={{opacity:0.5,fontSize:'0.5625rem',display:'block'}}>✎</span>

                      onBlur={()=>setEditingFixedCol(null)}
                      onKeyDown={e=>e.key==='Enter'&&setEditingFixedCol(null)}
